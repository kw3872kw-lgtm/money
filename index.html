<title>계량기 교체 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#f0f2f5;color:#1a1a1a;max-width:480px;margin:0 auto;min-height:100vh;}
.header{background:#185FA5;padding:calc(env(safe-area-inset-top,0px) + 16px) 16px 14px;}
.header h1{font-size:20px;font-weight:700;color:#fff;}
.header p{font-size:12px;color:rgba(255,255,255,0.75);margin-top:2px;}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:99;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.tab{flex:1;padding:10px 2px 8px;font-size:10px;text-align:center;border:none;background:none;color:#aaa;cursor:pointer;border-bottom:2.5px solid transparent;}
.tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:700;}
.tab i{font-size:20px;display:block;margin-bottom:2px;}
.page{display:none;padding:14px 14px 48px;}
.page.active{display:block;}
.sec{font-size:11px;font-weight:700;color:#999;margin:14px 0 7px;text-transform:uppercase;letter-spacing:.6px;}
.card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.mbox{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.mlabel{font-size:11px;color:#999;margin-bottom:5px;font-weight:500;}
.mval{font-size:22px;font-weight:800;color:#1a1a1a;}
.mval.b{color:#185FA5;}
label{font-size:13px;color:#666;display:block;margin-bottom:5px;font-weight:500;}
select,input[type=number],input[type=date],input[type=text]{width:100%;padding:12px 14px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:15px;background:#fafafa;color:#1a1a1a;outline:none;-webkit-appearance:none;}
select:focus,input:focus{border-color:#185FA5;background:#fff;}
.frow{margin-bottom:14px;}
.btn{width:100%;padding:15px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;border:none;}
.btn-p{background:#185FA5;color:#fff;margin-top:8px;}
.btn-p:active{background:#0C447C;}
.btn-o{background:#fff;color:#185FA5;border:1.5px solid #185FA5;}
.btn-sm{padding:8px 13px;font-size:12px;width:auto;border-radius:9px;}
.btn-r{background:#fff;color:#E24B4A;border:1.5px solid #E24B4A;}
/* 구경 입력 그리드 */
.sz-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
.sz-card{border-radius:14px;border:1.5px solid #e5e5e5;background:#fafafa;padding:12px 10px;}
.sz-card .sz-name{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:8px;text-align:center;}
.sz-card .sz-qty-row{display:flex;align-items:center;gap:6px;}
.sz-card .sq-btn{width:34px;height:34px;border-radius:9px;border:1.5px solid #e5e5e5;background:#fff;font-size:20px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:400;color:#555;flex-shrink:0;}
.sz-card .sq-btn:active{background:#f0f0f0;}
.sz-card .sq-input{flex:1;padding:7px 4px;border:1.5px solid #e5e5e5;border-radius:9px;font-size:18px;font-weight:700;text-align:center;background:#fff;min-width:0;}
.sz-card.has-qty{border-color:#185FA5;background:#E6F1FB;}
.sz-card.has-qty .sz-name{color:#0C447C;}
.sz-card.has-qty .sq-input{border-color:#185FA5;color:#0C447C;background:#fff;}
.preview-box{background:linear-gradient(135deg,#E6F1FB,#cfe4f7);border-radius:12px;padding:13px 16px;margin-top:10px;display:none;}
.preview-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px;color:#185FA5;}
.preview-row.total{font-size:16px;font-weight:800;border-top:1px solid rgba(24,95,165,0.2);margin-top:6px;padding-top:8px;}
/* 배지 */
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;}
/* 내역 */
.pbtn-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.pbtn{padding:6px 13px;border-radius:99px;font-size:12px;border:1.5px solid #e5e5e5;background:#fff;color:#888;cursor:pointer;font-weight:500;}
.pbtn.active{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:700;}
/* 내역 탭 */
.sub-tab-bar{display:flex;background:#f0f2f5;border-radius:12px;padding:3px;margin-bottom:12px;}
.sub-tab{flex:1;padding:8px 4px;font-size:12px;font-weight:600;text-align:center;border:none;background:none;color:#aaa;border-radius:9px;cursor:pointer;}
.sub-tab.active{background:#fff;color:#185FA5;box-shadow:0 1px 3px rgba(0,0,0,.1);}
/* 날짜 그룹 */
.date-group{margin-bottom:12px;}
.date-header{font-size:13px;font-weight:700;color:#555;margin-bottom:6px;padding:0 2px;display:flex;justify-content:space-between;align-items:center;}
.date-header span{font-size:12px;color:#aaa;font-weight:500;}
.log-card{background:#fff;border-radius:14px;padding:13px 14px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.lc-top{display:flex;justify-content:space-between;align-items:flex-start;}
.lc-worker{font-size:15px;font-weight:700;}
.lc-amount{font-size:15px;font-weight:800;color:#185FA5;}
.lc-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.lc-actions{display:flex;gap:6px;margin-top:8px;}
/* 작업자별 */
.wlog-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.wlog-top{display:flex;align-items:center;margin-bottom:10px;}
.avatar{width:40px;height:40px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#185FA5;flex-shrink:0;margin-right:11px;}
.wlog-rows{border-top:1px solid #f3f3f3;padding-top:8px;}
.wlog-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;border-bottom:1px solid #f8f8f8;}
.wlog-row:last-child{border-bottom:none;}
/* 수정 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px calc(env(safe-area-inset-bottom,0px) + 24px);width:100%;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;}
.modal-close{float:right;background:none;border:none;font-size:24px;color:#aaa;cursor:pointer;margin-top:-4px;}
/* 홈 날짜별 */
.day-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;}
.day-header{display:flex;justify-content:space-between;align-items:center;}
.day-date{font-size:14px;font-weight:700;}
.day-total{font-size:14px;font-weight:800;color:#185FA5;}
.day-detail{margin-top:10px;border-top:1px solid #f3f3f3;padding-top:8px;display:none;}
.day-detail.open{display:block;}
.empty{text-align:center;padding:44px 16px;color:#ccc;font-size:14px;}
.empty span{font-size:40px;display:block;margin-bottom:10px;}
/* 총합 카드 */
.total-card{background:linear-gradient(135deg,#185FA5,#0C447C);border-radius:16px;padding:20px;margin-bottom:12px;}
.total-label{font-size:13px;color:rgba(255,255,255,.8);margin-bottom:4px;font-weight:500;}
.total-val{font-size:32px;font-weight:800;color:#fff;}
.pay-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.price-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f3f3f3;}
.price-row:last-child{border-bottom:none;}
.add-row{display:flex;gap:8px;margin-top:12px;align-items:center;}
.add-row input{flex:1;}
</style>
</head>
<body>

<div class="header">
  <h1>💧 계량기 교체 관리</h1>
  <p id="today-date"></p>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="showPage('home')"><i>🏠</i>홈</button>
  <button class="tab" onclick="showPage('input')"><i>✏️</i>입력</button>
  <button class="tab" onclick="showPage('logs')"><i>📋</i>내역</button>
  <button class="tab" onclick="showPage('pay')"><i>💰</i>지급</button>
  <button class="tab" onclick="showPage('settings')"><i>⚙️</i>설정</button>
</div>

<!-- ══ 홈 ══ -->
<div id="page-home" class="page active">
  <div class="mgrid" style="margin-top:4px;">
    <div class="mbox"><div class="mlabel" id="lbl-today">최근 작업일</div><div class="mval b" id="m-today">0개</div></div>
    <div class="mbox"><div class="mlabel" id="lbl-month">이번 달 수량</div><div class="mval" id="m-month">0개</div></div>
    <div class="mbox"><div class="mlabel" id="lbl-pay">이번 달 지급액</div><div class="mval b" style="font-size:17px;" id="m-pay">0원</div></div>
    <div class="mbox"><div class="mlabel">총 작업 건수</div><div class="mval" id="m-total">0건</div></div>
  </div>
  <div class="sec" id="sec-workers">작업자별 현황</div>
  <div class="card" id="home-workers"></div>
  <div class="sec">작업일별 현황</div>
  <div class="pbtn-bar">
    <button class="pbtn active" onclick="filterHomeDays('month',this)">이번 달</button>
    <button class="pbtn" onclick="filterHomeDays('week',this)">이번 주</button>
    <button class="pbtn" onclick="filterHomeDays('all',this)">전체</button>
  </div>
  <div id="home-days"></div>
</div>

<!-- ══ 입력 ══ -->
<div id="page-input" class="page">
  <div class="sec" style="margin-top:0;">작업 내역 입력</div>
  <div class="card">
    <div class="frow"><label>작업일</label><input type="date" id="input-date"></div>
    <div class="frow"><label>작업자</label><select id="input-worker"><option value="">— 선택 —</option></select></div>
    <div class="frow">
      <label>구경별 교체 수량</label>
      <div class="sz-grid" id="sz-grid"></div>
    </div>
    <div class="preview-box" id="preview-box">
      <div id="preview-rows"></div>
    </div>
    <button class="btn btn-p" onclick="addLog()">✅ 작업 등록</button>
  </div>
</div>

<!-- ══ 내역 ══ -->
<div id="page-logs" class="page">
  <div class="sub-tab-bar">
    <button class="sub-tab active" onclick="switchLogView('date',this)">📅 날짜별</button>
    <button class="sub-tab" onclick="switchLogView('worker',this)">👷 작업자별</button>
  </div>
  <!-- 날짜별 -->
  <div id="logs-date-view">
    <div class="pbtn-bar">
      <button class="pbtn active" onclick="filterLogs('all',this)">전체</button>
      <button class="pbtn" onclick="filterLogs('today',this)">오늘</button>
      <button class="pbtn" onclick="filterLogs('week',this)">이번 주</button>
      <button class="pbtn" onclick="filterLogs('month',this)">이번 달</button>
    </div>
    <div id="log-list"></div>
  </div>
  <!-- 작업자별 -->
  <div id="logs-worker-view" style="display:none;">
    <div class="frow"><select id="log-worker-select" onchange="renderWorkerLogs()"><option value="">— 작업자 선택 —</option></select></div>
    <div class="pbtn-bar">
      <button class="pbtn active" onclick="filterWorkerLogs('all',this)">전체</button>
      <button class="pbtn" onclick="filterWorkerLogs('today',this)">오늘</button>
      <button class="pbtn" onclick="filterWorkerLogs('week',this)">이번 주</button>
      <button class="pbtn" onclick="filterWorkerLogs('month',this)">이번 달</button>
    </div>
    <div id="worker-log-list"></div>
  </div>
</div>

<!-- ══ 지급 ══ -->
<div id="page-pay" class="page">
  <div class="pbtn-bar">
    <button class="pbtn active" onclick="filterPay('month',this)">이번 달</button>
    <button class="pbtn" onclick="filterPay('all',this)">전체</button>
    <button class="pbtn" onclick="filterPay('custom',this)">날짜 지정</button>
  </div>
  <div id="pay-date-range" style="display:none;background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);">
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <div style="flex:1;min-width:120px;">
        <label style="font-size:11px;color:#999;font-weight:600;">시작일</label>
        <input type="date" id="pay-from" style="margin-top:4px;" onchange="renderPay('custom')">
      </div>
      <div style="font-size:18px;color:#aaa;padding-top:18px;">~</div>
      <div style="flex:1;min-width:120px;">
        <label style="font-size:11px;color:#999;font-weight:600;">종료일</label>
        <input type="date" id="pay-to" style="margin-top:4px;" onchange="renderPay('custom')">
      </div>
    </div>
  </div>
  <div id="pay-summary"></div>
  <div id="pay-export-btn" style="display:none;">
    <button class="btn btn-p" onclick="exportPDF()" style="background:linear-gradient(135deg,#185FA5,#0C447C);">
      📄 PDF로 내보내기
    </button>
  </div>
</div>

<!-- ══ 설정 ══ -->
<div id="page-settings" class="page">
  <div class="sec" style="margin-top:0;">작업자 관리</div>
  <div class="card">
    <div id="worker-list"></div>
    <div class="add-row"><input type="text" id="new-worker" placeholder="작업자 이름 입력"><button class="btn btn-o btn-sm" onclick="addWorker()">추가</button></div>
  </div>
  <div class="sec">구경별 단가 설정</div>
  <div class="card" id="price-list"></div>
  <div class="sec">앱 관리</div>
  <div class="card">
    <button class="btn btn-r btn-sm" onclick="clearData()">🗑 데이터 초기화</button>
  </div>
</div>

<!-- ══ 수정 모달 ══ -->
<div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">작업 수정</div>
    <div id="modal-body"></div>
  </div>
</div>

<script>

// ── 사전 입력 데이터 ──
(function(){
  try {
    const existing = localStorage.getItem('meterapp2');
    if(existing){
      // 이미 데이터가 있으면 단가(sizes)는 건드리지 않고 작업자·로그만 초기 데이터로 채움
      // (단, 로그가 비어있을 때만 초기 로그 적용)

const today=new Date();

// 기준일: 데이터가 있으면 가장 최근 작업일, 없으면 오늘
function getRefDate(){
  if(!state.logs||state.logs.length===0) return todayStr;
  return state.logs.map(l=>l.date).sort().slice(-1)[0];
}

const COLORS=[
  {bg:'#E6F1FB',color:'#0C447C'},
  {bg:'#EAF3DE',color:'#3B6D11'},
  {bg:'#FAEEDA',color:'#854F0B'},
  {bg:'#FAECE7',color:'#993C1D'}
];

// ── 상태 ──
let state=(()=>{
  try{const s=localStorage.getItem('meterapp2');if(s)return JSON.parse(s);}catch(e){}
  return {
    workers:['김철수','이영희','박민준','최수진','정우성'],
    sizes:[
      {id:'s1',name:'13mm',price:14000},
      {id:'s2',name:'20~32mm',price:14000},
      {id:'s3',name:'40~50mm',price:14000},
      {id:'s4',name:'기타',price:14000}
    ],
    logs:[]
  };
})();

function save(){try{localStorage.setItem('meterapp2',JSON.stringify(state));}catch(e){}}
// log 구조: {id, date, worker, qtys:{s1:0,s2:0,s3:0,s4:0}}
function logTotal(log){return state.sizes.reduce((s,sz)=>s+(log.qtys[sz.id]||0)*sz.price,0);}
function logQtyTotal(log){return state.sizes.reduce((s,sz)=>s+(log.qtys[sz.id]||0),0);}
function szColor(i){return COLORS[i%4];}
function fmtDate(d){
  const dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
}
function getMonday(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const day=d.getDay();
  const diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  return d.toISOString().split('T')[0];
}
function filterByPeriod(logs,period){
  const ref=getRefDate();
  if(period==='today') return logs.filter(l=>l.date===todayStr);
  if(period==='week'){
    const monStr=getMonday(ref);
    return logs.filter(l=>l.date>=monStr&&l.date<=ref);
  }
  if(period==='month') return logs.filter(l=>l.date.startsWith(ref.slice(0,7))&&l.date<=ref);
  return logs;
}

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  ['home','input','logs','pay','settings'].forEach((n,i)=>{if(n===name)document.querySelectorAll('.tab')[i].classList.add('active');});
  if(name==='home')renderHome();
  if(name==='input')initInput();
  if(name==='logs'){renderDateLogs(curLogFilter);updateWorkerLogSelect();}
  if(name==='pay')renderPay(curPayFilter);
  if(name==='settings')renderSettings();
}

let curHomeDayFilter='month';
function filterHomeDays(p,btn){
  curHomeDayFilter=p;
  document.querySelectorAll('#page-home .pbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHomeDays();
}
function renderHome(){
  const ref=getRefDate();
  const ms=ref.slice(0,7);
  const refDt=new Date(ref+'T00:00:00');
  const monthLabel=refDt.toLocaleDateString('ko-KR',{year:'numeric',month:'long'});
  const dayLabel=refDt.toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
  const tl=state.logs.filter(l=>l.date===ref);
  const ml=state.logs.filter(l=>l.date.startsWith(ms)&&l.date<=ref);
  document.getElementById('lbl-today').textContent=dayLabel+' 교체';
  document.getElementById('lbl-month').textContent=monthLabel+' 수량';
  document.getElementById('lbl-pay').textContent=monthLabel+' 지급액';
  document.getElementById('sec-workers').textContent='작업자별 현황 ('+monthLabel+')';
  document.getElementById('m-today').textContent=tl.reduce((s,l)=>s+logQtyTotal(l),0).toLocaleString()+'개';
  document.getElementById('m-month').textContent=ml.reduce((s,l)=>s+logQtyTotal(l),0).toLocaleString()+'개';
  document.getElementById('m-pay').textContent=ml.reduce((s,l)=>s+logTotal(l),0).toLocaleString()+'원';
  document.getElementById('m-total').textContent=state.logs.length.toLocaleString()+'건';

  // 작업자별
  document.getElementById('home-workers').innerHTML=state.workers.length===0
    ?'<div class="empty"><span>👷</span>작업자를 등록해주세요</div>'
    :state.workers.map(w=>{
      const wl=ml.filter(l=>l.worker===w);
      const qty=wl.reduce((s,l)=>s+logQtyTotal(l),0);
      const amt=wl.reduce((s,l)=>s+logTotal(l),0);
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f3f3f3;">
        <div style="display:flex;align-items:center;">
          <div class="avatar">${w.slice(0,2)}</div>
          <div><div style="font-size:15px;font-weight:700;">${w}</div><div style="font-size:12px;color:#aaa;">${monthLabel} ${qty}개</div></div>
        </div>
        <div style="text-align:right;"><div style="font-size:15px;font-weight:800;color:#185FA5;">${amt.toLocaleString()}원</div><div style="font-size:11px;color:#bbb;">지급 예정</div></div>
      </div>`;
    }).join('').replace(/border-bottom[^"]+(?="[^"]*<\/div>\s*$)/,'border-bottom:none');

  renderHomeDays();
}
function renderHomeDays(){
  const logs=filterByPeriod([...state.logs],curHomeDayFilter);
  const el=document.getElementById('home-days');
  if(!logs.length){el.innerHTML='<div class="empty"><span>📅</span>작업 내역이 없습니다</div>';return;}
  // 날짜별 그룹
  const groups={};
  logs.forEach(l=>{if(!groups[l.date])groups[l.date]=[];groups[l.date].push(l);});
  const dates=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  el.innerHTML=dates.map(date=>{
    const dayLogs=groups[date];
    const dayQty=dayLogs.reduce((s,l)=>s+logQtyTotal(l),0);
    const dayAmt=dayLogs.reduce((s,l)=>s+logTotal(l),0);
    const detail=dayLogs.map(l=>{
      const badges=state.sizes.map((sz,i)=>{
        const q=l.qtys[sz.id]||0; if(!q)return '';
        const c=szColor(i);
        return `<span class="badge" style="background:${c.bg};color:${c.color};">${sz.name} ${q}개</span>`;
      }).join('');
      return `<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f8f8f8;">
        <div>
          <div style="font-size:14px;font-weight:600;">${l.worker}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">${badges}</div>
        </div>
        <div style="font-size:14px;font-weight:700;color:#185FA5;white-space:nowrap;padding-left:8px;">${logTotal(l).toLocaleString()}원</div>
      </div>`;
    }).join('');
    return `<div class="day-card" onclick="toggleDayDetail(this)">
      <div class="day-header">
        <div class="day-date">${fmtDate(date)}</div>
        <div style="text-align:right;">
          <div class="day-total">${dayAmt.toLocaleString()}원</div>
          <div style="font-size:11px;color:#aaa;">${dayLogs.length}명 ${dayQty}개</div>
        </div>
      </div>
      <div class="day-detail">${detail}</div>
    </div>`;
  }).join('');
}
function toggleDayDetail(el){el.querySelector('.day-detail').classList.toggle('open');}

// ══ 입력 ══
function initInput(){
  document.getElementById('input-worker').innerHTML='<option value="">— 선택 —</option>'+state.workers.map(w=>`<option value="${w}">${w}</option>`).join('');
  buildSzGrid();
}
function buildSzGrid(){
  document.getElementById('sz-grid').innerHTML=state.sizes.map((sz,i)=>{
    const c=szColor(i);
    return `<div class="sz-card" id="szc-${sz.id}">
      <div class="sz-name" style="color:${c.color};">${sz.name}</div>
      <div class="sz-qty-row">
        <button class="sq-btn" onclick="adjQty('${sz.id}',-1)">－</button>
        <input class="sq-input" type="number" id="qty-${sz.id}" value="0" min="0" inputmode="numeric" onchange="onQtyChange('${sz.id}')">
        <button class="sq-btn" onclick="adjQty('${sz.id}',1)">＋</button>
      </div>
    </div>`;
  }).join('');
  updatePreview();
}
function adjQty(id,delta){
  const inp=document.getElementById('qty-'+id);
  const v=Math.max(0,(parseInt(inp.value)||0)+delta);
  inp.value=v;
  onQtyChange(id);
}
function onQtyChange(id){
  const v=parseInt(document.getElementById('qty-'+id).value)||0;
  const card=document.getElementById('szc-'+id);
  if(v>0)card.classList.add('has-qty'); else card.classList.remove('has-qty');
  updatePreview();
}
function getQtys(){
  const q={};
  state.sizes.forEach(sz=>{q[sz.id]=parseInt(document.getElementById('qty-'+sz.id).value)||0;});
  return q;
}
function updatePreview(){
  const qtys=getQtys();
  const rows=state.sizes.map((sz,i)=>{
    const q=qtys[sz.id]; if(!q)return '';
    const c=szColor(i);
    return `<div class="preview-row"><span><span class="badge" style="background:${c.bg};color:${c.color};">${sz.name}</span> × ${q}개</span><span>${(sz.price*q).toLocaleString()}원</span></div>`;
  }).filter(Boolean);
  const total=state.sizes.reduce((s,sz)=>s+(qtys[sz.id]||0)*sz.price,0);
  const box=document.getElementById('preview-box');
  if(rows.length){
    document.getElementById('preview-rows').innerHTML=rows.join('')+`<div class="preview-row total"><span>합계</span><span>${total.toLocaleString()}원</span></div>`;
    box.style.display='block';
  } else {box.style.display='none';}
}
function addLog(){
  const date=document.getElementById('input-date').value;
  const worker=document.getElementById('input-worker').value;
  const qtys=getQtys();
  const totalQty=Object.values(qtys).reduce((s,v)=>s+v,0);
  if(!date||!worker){alert('날짜와 작업자를 선택해주세요.');return;}
  if(totalQty===0){alert('수량을 1개 이상 입력해주세요.');return;}
  // 같은 날짜+작업자 기존 로그 있으면 합산 여부 확인
  const existing=state.logs.find(l=>l.date===date&&l.worker===worker);
  if(existing){
    if(!confirm(`${worker}의 ${date} 내역이 이미 있습니다.\n수량을 추가하시겠습니까?`))return;
    state.sizes.forEach(sz=>{existing.qtys[sz.id]=(existing.qtys[sz.id]||0)+(qtys[sz.id]||0);});
  } else {
    state.logs.push({id:Date.now(),date,worker,qtys});
  }
  save();
  // 초기화
  state.sizes.forEach(sz=>{document.getElementById('qty-'+sz.id).value=0;document.getElementById('szc-'+sz.id).classList.remove('has-qty');});
  document.getElementById('preview-box').style.display='none';
  const total=state.sizes.reduce((s,sz)=>s+(qtys[sz.id]||0)*sz.price,0);
  alert(`✅ 등록 완료!\n${worker} / 총 ${totalQty}개\n${total.toLocaleString()}원`);
}

// ══ 내역 ══
let curLogFilter='all', curWorkerLogFilter='all', curLogView='date';
function switchLogView(v,btn){
  curLogView=v;
  document.querySelectorAll('.sub-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('logs-date-view').style.display=v==='date'?'block':'none';
  document.getElementById('logs-worker-view').style.display=v==='worker'?'block':'none';
  if(v==='worker'){updateWorkerLogSelect();renderWorkerLogs();}
}
function filterLogs(p,btn){
  curLogFilter=p;
  document.querySelectorAll('#logs-date-view .pbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDateLogs(p);
}
function renderDateLogs(period){
  const logs=filterByPeriod([...state.logs],period).sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.getElementById('log-list');
  if(!logs.length){el.innerHTML='<div class="empty"><span>📋</span>작업 내역이 없습니다</div>';return;}
  // 날짜별 그룹
  const groups={};
  logs.forEach(l=>{if(!groups[l.date])groups[l.date]=[];groups[l.date].push(l);});
  const dates=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  el.innerHTML=dates.map(date=>{
    const dayLogs=groups[date];
    const dayAmt=dayLogs.reduce((s,l)=>s+logTotal(l),0);
    const dayQty=dayLogs.reduce((s,l)=>s+logQtyTotal(l),0);
    const cards=dayLogs.map(l=>{
      const badges=state.sizes.map((sz,i)=>{
        const q=l.qtys[sz.id]||0;if(!q)return '';
        const c=szColor(i);
        return `<span class="badge" style="background:${c.bg};color:${c.color};">${sz.name} ${q}개</span>`;
      }).join('');
      return `<div class="log-card">
        <div class="lc-top">
          <div class="lc-worker">${l.worker}</div>
          <div class="lc-amount">${logTotal(l).toLocaleString()}원</div>
        </div>
        <div class="lc-badges">${badges}</div>
        <div class="lc-actions">
          <button class="btn btn-o btn-sm" onclick="openEditModal(${l.id})">✏️ 수정</button>
          <button class="btn btn-r btn-sm" onclick="deleteLog(${l.id})">🗑 삭제</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="date-group">
      <div class="date-header"><b>${fmtDate(date)}</b><span>총 ${dayQty}개 · ${dayAmt.toLocaleString()}원</span></div>
      ${cards}
    </div>`;
  }).join('');
}
function deleteLog(id){
  if(!confirm('이 내역을 삭제하시겠습니까?'))return;
  state.logs=state.logs.filter(l=>l.id!==id);
  save();renderDateLogs(curLogFilter);renderHome();
}

// 작업자별
function updateWorkerLogSelect(){
  const sel=document.getElementById('log-worker-select');
  const cur=sel.value;
  sel.innerHTML='<option value="">— 작업자 선택 —</option>'+state.workers.map(w=>`<option value="${w}"${w===cur?' selected':''}>${w}</option>`).join('');
}
function filterWorkerLogs(p,btn){

  btn.classList.add('active');

}

  if(!logs.length){el.innerHTML='<div class="empty"><span>📋</span>해당 기간 내역이 없습니다</div>';return;}

    <div><div style="font-size:13px;color:#999;">총 교체 수량</div><div style="font-size:20px;font-weight:800;">${totalQty}개</div></div>
    <div style="text-align:right;"><div style="font-size:13px;color:#999;">지급 예정</div><div style="font-size:20px;font-weight:800;color:#185FA5;">${totalAmt.toLocaleString()}원</div></div>
  </div>`;

      return `<div class="wlog-row">
        <span class="badge" style="background:${c.bg};color:${c.color};">${sz.name}</span>
        <span style="color:#555;">${q}개 × ${sz.price.toLocaleString()}원</span>
        <span style="font-weight:700;color:#185FA5;">${amt.toLocaleString()}원</span>

      <div class="wlog-top" style="justify-content:space-between;">

function deleteLog2(id){

}

// ── 수정 모달 ──
function openEditModal(id){
  const log=state.logs.find(l=>l.id===id);
  if(!log)return;
  document.getElementById('modal-title').textContent=`수정 — ${log.worker} (${log.date})`;
  const qInputs=state.sizes.map((sz,i)=>{
    const c=szColor(i);
    const q=log.qtys[sz.id]||0;
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f3f3f3;">
      <span class="badge" style="background:${c.bg};color:${c.color};font-size:13px;padding:5px 12px;">${sz.name}</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="sq-btn" onclick="adjModal('m-${sz.id}',-1)">－</button>
        <input class="sq-input" id="m-${sz.id}" type="number" value="${q}" min="0" inputmode="numeric" style="width:70px;">
        <button class="sq-btn" onclick="adjModal('m-${sz.id}',1)">＋</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('modal-body').innerHTML=`
    ${qInputs}
    <button class="btn btn-p" style="margin-top:16px;" onclick="saveEdit(${id})">💾 저장</button>
  `;
  document.getElementById('modal-overlay').style.display='flex';
}
function adjModal(inputId,delta){
  const inp=document.getElementById(inputId);
  inp.value=Math.max(0,(parseInt(inp.value)||0)+delta);
}
function saveEdit(id){
  const log=state.logs.find(l=>l.id===id);
  if(!log)return;
  const newQtys={};
  state.sizes.forEach(sz=>{newQtys[sz.id]=parseInt(document.getElementById('m-'+sz.id).value)||0;});
  const total=Object.values(newQtys).reduce((s,v)=>s+v,0);
  if(total===0){if(!confirm('수량이 모두 0입니다. 이 내역을 삭제하시겠습니까?'))return;state.logs=state.logs.filter(l=>l.id!==id);}
  else{log.qtys=newQtys;}
  save();closeModal();
  renderDateLogs(curLogFilter);
  renderWorkerLogs();
  renderHome();
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modal-overlay'))return;
  document.getElementById('modal-overlay').style.display='none';
}

// ══ 지급 ══
let curPayFilter='month';
function filterPay(p,btn){
  curPayFilter=p;
  document.querySelectorAll('#page-pay .pbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const rangeEl=document.getElementById('pay-date-range');
  if(p==='custom'){
    rangeEl.style.display='block';
    // 기본값: 해당 월 1일 ~ 기준일
    const ref=getRefDate();
    if(!document.getElementById('pay-from').value) document.getElementById('pay-from').value=ref.slice(0,7)+'-01';
    if(!document.getElementById('pay-to').value) document.getElementById('pay-to').value=ref;
  } else {
    rangeEl.style.display='none';
  }
  renderPay(p);
}
function getPayLogs(period){
  if(period==='custom'){
    const from=document.getElementById('pay-from').value;
    const to=document.getElementById('pay-to').value;
    if(!from||!to) return [];
    return state.logs.filter(l=>l.date>=from&&l.date<=to);
  }
  return filterByPeriod([...state.logs],period);
}
function renderPay(period){
  const logs=getPayLogs(period);
  const total=logs.reduce((s,l)=>s+logTotal(l),0);
  const ref=getRefDate();
  const monthLabel=new Date(ref+'T00:00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long'});
  let periodLabel='전체';
  if(period==='month') periodLabel=monthLabel;
  if(period==='custom'){
    const from=document.getElementById('pay-from').value;
    const to=document.getElementById('pay-to').value;
    if(from&&to){
      const fd=new Date(from+'T00:00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
      const td=new Date(to+'T00:00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
      periodLabel=fd+' ~ '+td;
    }
  }

  let html=`<div class="total-card"><div class="total-label">${periodLabel} 총 지급액</div><div class="total-val">${total.toLocaleString()}원</div></div>`;

  // 날짜별 그룹 (날짜 지정일 때 추가 표시)
  if(period==='custom'&&logs.length>0){
    const groups={};
    logs.forEach(l=>{if(!groups[l.date])groups[l.date]=[];groups[l.date].push(l);});
    const dates=Object.keys(groups).sort();
    html+=`<div style="font-size:11px;font-weight:700;color:#999;margin:14px 0 7px;text-transform:uppercase;letter-spacing:.6px;">작업일별 내역</div>`;
    dates.forEach(date=>{
      const dl=groups[date];
      const dAmt=dl.reduce((s,l)=>s+logTotal(l),0);
      const dQty=dl.reduce((s,l)=>s+logQtyTotal(l),0);
      html+=`<div style="background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-size:14px;font-weight:700;color:#555;">${fmtDate(date)}</span>
          <span style="font-size:13px;color:#aaa;">${dQty}개 · ${dAmt.toLocaleString()}원</span>
        </div>`;
      dl.forEach(l=>{
        const badges=state.sizes.map((sz,i)=>{
          const q=l.qtys[sz.id]||0;if(!q)return '';
          const c=szColor(i);
          return `<span class="badge" style="background:${c.bg};color:${c.color};">${sz.name} ${q}개</span>`;
        }).join('');
        html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-top:1px solid #f5f5f5;">
          <div><span style="font-size:13px;font-weight:600;">${l.worker}</span><div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;">${badges}</div></div>
          <span style="font-size:13px;font-weight:700;color:#185FA5;">${logTotal(l).toLocaleString()}원</span>
        </div>`;
      });
      html+=`</div>`;
    });
    html+=`<div style="font-size:11px;font-weight:700;color:#999;margin:14px 0 7px;text-transform:uppercase;letter-spacing:.6px;">작업자별 합계</div>`;
  }

  state.workers.forEach(w=>{
    const wl=logs.filter(l=>l.worker===w);
    const qty=wl.reduce((s,l)=>s+logQtyTotal(l),0);
    const amt=wl.reduce((s,l)=>s+logTotal(l),0);
    const breakdown=state.sizes.map((sz,i)=>{
      const c=szColor(i);
      const q=wl.reduce((s,l)=>s+(l.qtys[sz.id]||0),0);
      if(!q)return '';
      return `<span class="badge" style="background:${c.bg};color:${c.color};margin:2px;">${sz.name} ${q}개 · ${(q*sz.price).toLocaleString()}원</span>`;
    }).join('');
    html+=`<div class="pay-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="font-size:16px;font-weight:700;">${w}</div>
          <div style="font-size:12px;color:#aaa;margin:3px 0;">총 ${qty}개</div>
          <div style="display:flex;flex-wrap:wrap;">${breakdown||'<span style="font-size:12px;color:#ccc;">작업 없음</span>'}</div>
        </div>
        <div style="font-size:20px;font-weight:800;color:#185FA5;padding-left:8px;">${amt.toLocaleString()}원</div>
      </div>
    </div>`;
  });

  document.getElementById('pay-summary').innerHTML=html;
  document.getElementById('pay-export-btn').style.display=(logs.length>0)?'block':'none';
}

      <div style="display:flex;align-items:center;gap:6px;">
        <input type="number" id="pinput-${sz.id}"
          style="width:120px;text-align:right;padding:9px 11px;border:1.5px solid #e5e5e5;border-radius:10px;font-size:14px;background:#fafafa;font-weight:600;"
          value="${sz.price}" inputmode="numeric"
          oninput="onPriceInput('${sz.id}',this.value)">
        <span style="font-size:13px;color:#aaa;">원/개</span>
      </div>
    </div>`;
  }).join('') + `
  <div id="price-save-bar" style="display:none;margin-top:14px;padding-top:14px;border-top:1.5px solid #f0f0f0;">
    <div style="font-size:12px;color:#854F0B;background:#FAEEDA;border-radius:8px;padding:8px 12px;margin-bottom:10px;">
      ⚠️ 변경된 단가가 있습니다. 저장하면 모든 작업 내역의 금액이 새 단가로 적용됩니다.
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-o btn-sm" style="flex:1;" onclick="cancelPriceEdit()">취소</button>
      <button class="btn btn-p btn-sm" style="flex:2;background:#185FA5;" onclick="savePrices()">✅ 저장 · 금액 적용</button>
    </div>
  </div>`;
}

function onPriceInput(id, val){
  pendingPrices[id] = parseInt(val) || 0;
  // 하나라도 기존 단가와 다르면 저장 바 표시
  const changed = state.sizes.some(sz => pendingPrices[sz.id] !== sz.price);
  document.getElementById('price-save-bar').style.display = changed ? 'block' : 'none';
}

function cancelPriceEdit(){
  // 원래 단가로 복원
  state.sizes.forEach(sz => {
    const inp = document.getElementById('pinput-'+sz.id);
    if(inp) inp.value = sz.price;
    pendingPrices[sz.id] = sz.price;
  });
  document.getElementById('price-save-bar').style.display = 'none';
}

function savePrices(){
  const changes = state.sizes.filter(sz => pendingPrices[sz.id] !== sz.price);
  if(!changes.length) return;

  const changeDesc = changes.map(sz =>
    `• ${sz.name}: ${sz.price.toLocaleString()}원 → ${pendingPrices[sz.id].toLocaleString()}원`
  ).join('\n');

  if(!confirm(`아래 단가를 변경하고\n모든 금액 계산에 적용할까요?\n\n${changeDesc}`)) return;

  // 단가 저장
  state.sizes.forEach(sz => { sz.price = pendingPrices[sz.id]; });
  save();

  document.getElementById('price-save-bar').style.display = 'none';

  // 변경 내용 요약 표시
  const totalAmt = state.logs.reduce((s,l) => s + logTotal(l), 0);
  alert(`✅ 단가가 저장되었습니다.\n\n${changeDesc}\n\n전체 작업 내역 총액: ${totalAmt.toLocaleString()}원`);

  renderSettings();
  // 다른 화면도 갱신
  renderHome();
}
function clearData(){
  if(!confirm('모든 데이터를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다.'))return;
  localStorage.removeItem('meterapp2');location.reload();
}

renderHome();renderSettings();
</script>
</body>
</html>

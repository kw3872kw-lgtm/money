<title>계량기 교체 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#f0f2f5;color:#1a1a1a;max-width:480px;margin:0 auto;min-height:100vh;}
/* ── 현장 선택 화면 ── */
.site-screen{min-height:100vh;display:flex;flex-direction:column;}
.site-header{background:linear-gradient(135deg,#185FA5,#0C447C);padding:calc(env(safe-area-inset-top,0px)+24px) 20px 24px;}
.site-header h1{font-size:22px;font-weight:800;color:#fff;}
.site-header p{font-size:13px;color:rgba(255,255,255,0.75);margin-top:4px;}
.site-body{flex:1;padding:16px;}
.site-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.12s;}
.site-card:active{transform:scale(0.98);background:#f5f9ff;}
.site-card-left{display:flex;align-items:center;gap:12px;}
.site-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.site-name{font-size:16px;font-weight:700;}
.site-sub{font-size:12px;color:#aaa;margin-top:2px;}
.site-arrow{font-size:20px;color:#ccc;}
.add-site-btn{width:100%;padding:16px;border-radius:16px;border:2px dashed #c0d4e8;background:transparent;color:#185FA5;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;}
.add-site-btn:active{background:#f0f6ff;}
/* ── 앱 화면 ── */
.app-screen{display:none;flex-direction:column;min-height:100vh;}
.app-screen.active{display:flex;}
.header{background:#185FA5;padding:calc(env(safe-area-inset-top,0px)+12px) 16px 12px;display:flex;align-items:center;gap:10px;}
.header-back{background:rgba(255,255,255,0.2);border:none;border-radius:10px;padding:6px 10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
.header-info{flex:1;min-width:0;}
.header-info h1{font-size:17px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header-info p{font-size:11px;color:rgba(255,255,255,0.75);margin-top:1px;}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:99;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.tab{flex:1;padding:10px 2px 8px;font-size:10px;text-align:center;border:none;background:none;color:#aaa;cursor:pointer;border-bottom:2.5px solid transparent;}
.tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:700;}
.tab i{font-size:20px;display:block;margin-bottom:2px;}
.page{display:none;padding:14px 14px 48px;}
.page.active{display:block;}
.sec{font-size:11px;font-weight:700;color:#999;margin:14px 0 7px;text-transform:uppercase;letter-spacing:.6px;}
.card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.mbox{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.mlabel{font-size:11px;color:#999;margin-bottom:5px;font-weight:500;}
.mval{font-size:22px;font-weight:800;color:#1a1a1a;}
.mval.b{color:#185FA5;}
label{font-size:13px;color:#666;display:block;margin-bottom:5px;font-weight:500;}
select,input[type=number],input[type=date],input[type=text]{width:100%;padding:12px 14px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:15px;background:#fafafa;color:#1a1a1a;outline:none;-webkit-appearance:none;}
select:focus,input:focus{border-color:#185FA5;background:#fff;}
.frow{margin-bottom:14px;}
.btn{width:100%;padding:15px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;border:none;}
.btn-p{background:#185FA5;color:#fff;margin-top:8px;}
.btn-p:active{background:#0C447C;}
.btn-o{background:#fff;color:#185FA5;border:1.5px solid #185FA5;}
.btn-sm{padding:8px 13px;font-size:12px;width:auto;border-radius:9px;}
.btn-r{background:#fff;color:#E24B4A;border:1.5px solid #E24B4A;}
.sz-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
.sz-card{border-radius:14px;border:1.5px solid #e5e5e5;background:#fafafa;padding:12px 10px;}
.sz-card .sz-name{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:8px;text-align:center;}
.sz-card .sz-qty-row{display:flex;align-items:center;gap:6px;}
.sz-card .sq-btn{width:34px;height:34px;border-radius:9px;border:1.5px solid #e5e5e5;background:#fff;font-size:20px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:400;color:#555;flex-shrink:0;}
.sz-card .sq-btn:active{background:#f0f0f0;}
.sz-card .sq-input{flex:1;padding:7px 4px;border:1.5px solid #e5e5e5;border-radius:9px;font-size:18px;font-weight:700;text-align:center;background:#fff;min-width:0;}
.sz-card.has-qty{border-color:#185FA5;background:#E6F1FB;}
.sz-card.has-qty .sz-name{color:#0C447C;}
.sz-card.has-qty .sq-input{border-color:#185FA5;color:#0C447C;background:#fff;}
.preview-box{background:linear-gradient(135deg,#E6F1FB,#cfe4f7);border-radius:12px;padding:13px 16px;margin-top:10px;display:none;}
.preview-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px;color:#185FA5;}
.preview-row.total{font-size:16px;font-weight:800;border-top:1px solid rgba(24,95,165,0.2);margin-top:6px;padding-top:8px;}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;}
.pbtn-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.pbtn{padding:6px 13px;border-radius:99px;font-size:12px;border:1.5px solid #e5e5e5;background:#fff;color:#888;cursor:pointer;font-weight:500;}
.pbtn.active{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:700;}
.sub-tab-bar{display:flex;background:#f0f2f5;border-radius:12px;padding:3px;margin-bottom:12px;}
.sub-tab{flex:1;padding:8px 4px;font-size:12px;font-weight:600;text-align:center;border:none;background:none;color:#aaa;border-radius:9px;cursor:pointer;}
.sub-tab.active{background:#fff;color:#185FA5;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.date-group{margin-bottom:12px;}
.date-header{font-size:13px;font-weight:700;color:#555;margin-bottom:6px;padding:0 2px;display:flex;justify-content:space-between;align-items:center;}
.date-header span{font-size:12px;color:#aaa;font-weight:500;}
.log-card{background:#fff;border-radius:14px;padding:13px 14px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.lc-top{display:flex;justify-content:space-between;align-items:flex-start;}
.lc-worker{font-size:15px;font-weight:700;}
.lc-amount{font-size:15px;font-weight:800;color:#185FA5;}
.lc-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.lc-actions{display:flex;gap:6px;margin-top:8px;}
.wlog-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.wlog-top{display:flex;align-items:center;margin-bottom:10px;}
.avatar{width:40px;height:40px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#185FA5;flex-shrink:0;margin-right:11px;}
.wlog-rows{border-top:1px solid #f3f3f3;padding-top:8px;}
.wlog-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;border-bottom:1px solid #f8f8f8;}
.wlog-row:last-child{border-bottom:none;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px calc(env(safe-area-inset-bottom,0px)+24px);width:100%;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;}
.modal-close{float:right;background:none;border:none;font-size:24px;color:#aaa;cursor:pointer;margin-top:-4px;}
.day-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;}
.day-header{display:flex;justify-content:space-between;align-items:center;}
.day-date{font-size:14px;font-weight:700;}
.day-total{font-size:14px;font-weight:800;color:#185FA5;}
.day-detail{margin-top:10px;border-top:1px solid #f3f3f3;padding-top:8px;display:none;}
.day-detail.open{display:block;}
.empty{text-align:center;padding:44px 16px;color:#ccc;font-size:14px;}
.empty span{font-size:40px;display:block;margin-bottom:10px;}
.total-card{background:linear-gradient(135deg,#185FA5,#0C447C);border-radius:16px;padding:20px;margin-bottom:12px;}
.total-label{font-size:13px;color:rgba(255,255,255,.8);margin-bottom:4px;font-weight:500;}
.total-val{font-size:32px;font-weight:800;color:#fff;}
.pay-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.price-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f3f3f3;}
.price-row:last-child{border-bottom:none;}
.add-row{display:flex;gap:8px;margin-top:12px;align-items:center;}
.add-row input{flex:1;}
/* 현장 설정 */
.site-del-btn{background:none;border:none;font-size:20px;color:#ddd;cursor:pointer;}
.color-dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:6px;}
/* 전체 현황 탭 */
.main-tab-bar{display:flex;background:rgba(255,255,255,0.15);border-radius:12px;padding:3px;margin:12px 0 0;}
.main-tab{flex:1;padding:9px 4px;font-size:13px;font-weight:600;text-align:center;border:none;background:none;color:rgba(255,255,255,0.7);border-radius:9px;cursor:pointer;}
.main-tab.active{background:#fff;color:#185FA5;box-shadow:0 1px 4px rgba(0,0,0,0.15);}
.summary-view{display:none;}
.summary-view.active{display:block;}
.sum-month-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.sum-pbtn{padding:6px 13px;border-radius:99px;font-size:12px;border:1.5px solid #e5e5e5;background:#fff;color:#888;cursor:pointer;font-weight:500;}
.sum-pbtn.active{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:700;}
.sum-total-card{background:linear-gradient(135deg,#185FA5,#0C447C);border-radius:16px;padding:18px 20px;margin-bottom:12px;}
.sum-total-label{font-size:12px;color:rgba(255,255,255,.8);margin-bottom:4px;font-weight:500;}
.sum-total-val{font-size:28px;font-weight:800;color:#fff;}
.sum-section{font-size:11px;font-weight:700;color:#999;margin:14px 0 8px;text-transform:uppercase;letter-spacing:.6px;}
.sum-card{background:#fff;border-radius:14px;padding:0;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;}
.sum-card-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border-bottom:1px solid #f3f3f3;}
.sum-card-body{padding:0 16px 12px;display:none;}
.sum-card-body.open{display:block;}
.sum-worker-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f8f8f8;}
.sum-worker-row:last-child{border-bottom:none;}
.sum-site-tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;margin-bottom:3px;}
</style>
</head>
<body>

<!-- ══ 현장 선택 화면 ══ -->
<div class="site-screen" id="site-screen">
  <div class="site-header">
    <h1>💧 계량기 교체 관리</h1>
    <p id="site-today"></p>
    <div class="main-tab-bar">
      <button class="main-tab active" onclick="switchMainTab('sites',this)">🏗️ 현장 목록</button>
      <button class="main-tab" onclick="switchMainTab('summary',this)">📊 전체 합산</button>
    </div>
  </div>

  <!-- 앱 설치 배너 (Android Chrome 자동) -->
  <div id="install-banner" style="display:none;background:#fff;border-left:4px solid #185FA5;margin:12px 14px 0;border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.1);display:none;align-items:center;gap:12px;">
    <span style="font-size:28px;">📲</span>
    <div style="flex:1;">
      <div style="font-size:14px;font-weight:700;color:#185FA5;">앱으로 설치하기</div>
      <div style="font-size:12px;color:#888;margin-top:2px;">홈 화면에 추가하면 앱처럼 사용 가능</div>
    </div>
    <button onclick="installApp()" style="background:#185FA5;color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;">설치</button>
    <button onclick="document.getElementById('install-banner').style.display='none'" style="background:none;border:none;font-size:20px;color:#ccc;cursor:pointer;">✕</button>
  </div>

  <!-- iOS 설치 안내 배너 -->
  <div id="ios-banner" style="display:none;background:#fff;border-left:4px solid #185FA5;margin:12px 14px 0;border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div style="font-size:14px;font-weight:700;color:#185FA5;margin-bottom:8px;">📲 홈 화면에 앱 추가하기 (iPhone)</div>
      <button onclick="document.getElementById('ios-banner').style.display='none'" style="background:none;border:none;font-size:20px;color:#ccc;cursor:pointer;margin-top:-4px;">✕</button>
    </div>
    <div style="font-size:13px;color:#555;line-height:1.8;">
      <div>① 하단 <b>공유 버튼</b> (□↑) 탭</div>
      <div>② 스크롤 내려서 <b>홈 화면에 추가</b> 탭</div>
      <div>③ 오른쪽 상단 <b>추가</b> 탭</div>
    </div>
  </div>

  <div class="site-body">
    <!-- 현장 목록 뷰 -->
    <div class="summary-view active" id="view-sites">
      <div class="sec">현장 선택</div>
      <div id="site-list"></div>
      <button class="add-site-btn" onclick="openAddSite()">＋ 새 현장 추가</button>
    </div>
    <!-- 전체 합산 뷰 -->
    <div class="summary-view" id="view-summary">
      <div class="sum-month-bar" id="sum-month-bar"></div>
      <div id="summary-content"></div>
    </div>
  </div>
</div>

<!-- ══ 앱 화면 ══ -->
<div class="app-screen" id="app-screen">
  <div class="header">
    <button class="header-back" onclick="goSiteSelect()">◀ 현장</button>
    <div class="header-info">
      <h1 id="app-site-name"></h1>
      <p id="today-date"></p>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="showPage('home')"><i>🏠</i>홈</button>
    <button class="tab" onclick="showPage('input')"><i>✏️</i>입력</button>
    <button class="tab" onclick="showPage('logs')"><i>📋</i>내역</button>
    <button class="tab" onclick="showPage('pay')"><i>💰</i>지급</button>
    <button class="tab" onclick="showPage('settings')"><i>⚙️</i>설정</button>
  </div>

  <!-- 홈 -->
  <div id="page-home" class="page active">
    <div class="mgrid" style="margin-top:4px;">
      <div class="mbox"><div class="mlabel" id="lbl-today">최근 작업일</div><div class="mval b" id="m-today">0개</div></div>
      <div class="mbox"><div class="mlabel" id="lbl-month">이번 달 수량</div><div class="mval" id="m-month">0개</div></div>
      <div class="mbox"><div class="mlabel" id="lbl-pay">이번 달 지급액</div><div class="mval b" style="font-size:17px;" id="m-pay">0원</div></div>
      <div class="mbox"><div class="mlabel">총 작업 건수</div><div class="mval" id="m-total">0건</div></div>
    </div>
    <div class="sec" id="sec-workers">작업자별 현황</div>
    <div class="card" id="home-workers"></div>
    <div class="sec">작업일별 현황</div>
    <div class="pbtn-bar">
      <button class="pbtn active" onclick="filterHomeDays('month',this)">이번 달</button>

  <div id="page-input" class="page">

  <!-- 내역 -->

        <button class="pbtn" onclick="filterWorkerLogs('today',this)">오늘</button>
        <button class="pbtn" onclick="filterWorkerLogs('week',this)">이번 주</button>
        <button class="pbtn" onclick="filterWorkerLogs('month',this)">이번 달</button>

  <!-- 지급 -->
  <div id="page-pay" class="page">

      <button class="pbtn" onclick="filterPay('all',this)">전체</button>
      <button class="pbtn" onclick="filterPay('custom',this)">날짜 지정</button>
    </div>
    <div id="pay-date-range" style="display:none;background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <div style="flex:1;min-width:120px;"><label style="font-size:11px;color:#999;font-weight:600;">시작일</label><input type="date" id="pay-from" style="margin-top:4px;" onchange="renderPay('custom')"></div>
        <div style="font-size:18px;color:#aaa;padding-top:18px;">~</div>
        <div style="flex:1;min-width:120px;"><label style="font-size:11px;color:#999;font-weight:600;">종료일</label><input type="date" id="pay-to" style="margin-top:4px;" onchange="renderPay('custom')"></div>
      </div>
    </div>
    <div id="pay-summary"></div>
    <div id="pay-export-btn" style="display:none;">
      <button class="btn btn-p" onclick="exportPDF()" style="background:linear-gradient(135deg,#185FA5,#0C447C);">📄 PDF로 내보내기</button>
    </div>
  </div>

  <!-- 설정 -->
  <div id="page-settings" class="page">
    <div class="sec" style="margin-top:0;">현장 정보</div>
    <div class="card">
      <div class="frow"><label>현장명</label><input type="text" id="settings-site-name" placeholder="현장명 입력"></div>
      <button class="btn btn-o btn-sm" onclick="saveSiteName()">✅ 현장명 저장</button>
    </div>
    <div class="sec">작업자 관리</div>
    <div class="card">
      <div id="worker-list"></div>
      <div class="add-row"><input type="text" id="new-worker" placeholder="작업자 이름 입력"><button class="btn btn-o btn-sm" onclick="addWorker()">추가</button></div>
    </div>
    <div class="sec">구경별 단가 설정</div>

    <div class="sec">현장 데이터</div>
    <div class="card">
      <button class="btn btn-r btn-sm" onclick="clearData()">🗑 이 현장 데이터 초기화</button>
    </div>

<!-- 현장 추가 모달 -->
<div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">새 현장 추가</div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── PWA ──
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/money/sw.js').catch(()=>{});
}

// ── 설치 프롬프트 ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  banner.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
  deferredPrompt = null;
});
function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').style.display = 'none';
    });
  }
}

// iOS 감지 → 설치 안내 배너 표시 (standalone 모드가 아닐 때만)
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone === true;
if (isIOS && !isStandalone) {
  document.getElementById('ios-banner').style.display = 'block';
}
const today=new Date();
const todayStr=today.toISOString().split('T')[0];
const todayFmt=today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
document.getElementById('site-today').textContent=todayFmt;
document.getElementById('today-date').textContent=todayFmt;

const COLORS=[
  {bg:'#E6F1FB',color:'#0C447C'},
  {bg:'#EAF3DE',color:'#3B6D11'},
  {bg:'#FAEEDA',color:'#854F0B'},
  {bg:'#FAECE7',color:'#993C1D'},
  {bg:'#EDE7F6',color:'#4A148C'},
  {bg:'#E0F2F1',color:'#004D40'},
  {bg:'#FBE9E7',color:'#BF360C'}
];
const SITE_COLORS=['#185FA5','#2E7D32','#6A1B9A','#B71C1C','#E65100','#00695C'];
const SITE_EMOJIS=['🏗️','🌊','🏢','🏭','🏘️','⚙️'];

// ── 전역 상태 ──
let currentSiteId = null;  // 현재 선택된 현장 ID
let state = null;           // 현재 현장 데이터

// ── 현장 목록 관리 ──
function getSiteList(){
  try{const s=localStorage.getItem('meter_sites');return s?JSON.parse(s):[];}catch(e){return[];}
}
function saveSiteList(list){
  try{localStorage.setItem('meter_sites',JSON.stringify(list));}catch(e){}
}
function getSiteData(id){
  try{
    const s=localStorage.getItem('meter_site_'+id);
    if(s) return JSON.parse(s);
  }catch(e){}
  return {
    workers:[],
    sizes:[
      {id:'s1',name:'13mm',price:14000},
      {id:'s2',name:'20mm',price:14000},
      {id:'s3',name:'25mm',price:14000},
      {id:'s4',name:'32mm',price:14000},
      {id:'s5',name:'40mm',price:14000},
      {id:'s6',name:'50mm',price:14000},
      {id:'s7',name:'기타',price:14000}
    ],
    logs:[]
  };
}
function saveSiteData(){
  try{localStorage.setItem('meter_site_'+currentSiteId,JSON.stringify(state));}catch(e){}
}

// ── 현장 선택 화면 ──
let curSumMonth = '';  // 전체합산 선택 월

function switchMainTab(tab, btn){
  document.querySelectorAll('.main-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-sites').classList.toggle('active', tab==='sites');
  document.getElementById('view-summary').classList.toggle('active', tab==='summary');
  if(tab==='summary') renderSummary();
}

function getAllMonths(){
  const sites = getSiteList();
  const months = new Set();
  sites.forEach(s=>{
    const data = getSiteData(s.id);
    data.logs.forEach(l=>months.add(l.date.slice(0,7)));
  });
  return Array.from(months).sort((a,b)=>b.localeCompare(a));
}

function renderSummary(){
  const sites = getSiteList();
  if(!sites.length){
    document.getElementById('summary-content').innerHTML='<div class="empty"><span>🏗️</span>현장을 먼저 추가해주세요</div>';
    return;
  }

  // 월 목록 버튼 생성
  const months = getAllMonths();
  if(!months.length){
    document.getElementById('sum-month-bar').innerHTML='';
    document.getElementById('summary-content').innerHTML='<div class="empty"><span>📋</span>작업 내역이 없습니다</div>';
    return;
  }
  if(!curSumMonth || !months.includes(curSumMonth)) curSumMonth = months[0];

  document.getElementById('sum-month-bar').innerHTML =
    ['전체',...months].map(m=>`<button class="sum-pbtn${(m==='전체'?curSumMonth==='all':curSumMonth===m)?' active':''}" onclick="setSumMonth('${m}',this)">${m==='전체'?'전체':m.replace('-','년 ')+'월'}</button>`).join('');

  buildSummaryContent(sites);
}

function setSumMonth(m, btn){
  curSumMonth = m==='전체' ? 'all' : m;
  document.querySelectorAll('.sum-pbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildSummaryContent(getSiteList());
}

function buildSummaryContent(sites){
  // 모든 현장의 로그를 월 필터 적용해서 수집
  const allSiteData = sites.map((s,si)=>({
    site: s,
    color: SITE_COLORS[si%SITE_COLORS.length],
    data: getSiteData(s.id)
  }));

  // 필터된 로그
  const filtered = allSiteData.map(sd=>({
    ...sd,
    logs: sd.data.logs.filter(l=> curSumMonth==='all' || l.date.startsWith(curSumMonth))
  }));

  // 전체 합계
  const grandTotal = filtered.reduce((s,sd)=>
    s + sd.logs.reduce((a,l)=>a+logTotalForData(l,sd.data),0), 0);
  const grandQty = filtered.reduce((s,sd)=>
    s + sd.logs.reduce((a,l)=>a+sd.data.sizes.reduce((q,sz)=>q+(l.qtys[sz.id]||0),0),0), 0);

  const monthLabel = curSumMonth==='all' ? '전체' :
    curSumMonth.replace(/(\d+)-(\d+)/, '$1년 $2월');

  let html = `<div class="sum-total-card">
    <div class="sum-total-label">${monthLabel} 전체 현장 합산</div>
    <div class="sum-total-val">${grandTotal.toLocaleString()}원</div>
    <div style="font-size:13px;color:rgba(255,255,255,.75);margin-top:4px;">총 ${grandQty.toLocaleString()}개</div>
  </div>`;

  // ── 작업자별 합산 ──
  // 모든 작업자 이름 수집
  const allWorkers = [...new Set(filtered.flatMap(sd=>sd.data.workers))];

  html += `<div class="sum-section">👷 작업자별 합산</div>`;

  if(!allWorkers.length){
    html += '<div class="empty" style="padding:20px;"><span>👷</span>작업자가 없습니다</div>';
  } else {
    allWorkers.forEach(worker=>{
      // 작업자의 현장별 수량·금액 수집
      let workerTotal = 0, workerQty = 0;
      const siteBreakdown = [];

      filtered.forEach(sd=>{
        const wLogs = sd.logs.filter(l=>l.worker===worker);
        if(!wLogs.length) return;
        const amt = wLogs.reduce((s,l)=>s+logTotalForData(l,sd.data),0);
        const qty = wLogs.reduce((s,l)=>s+sd.data.sizes.reduce((q,sz)=>q+(l.qtys[sz.id]||0),0),0);
        const szBreakdown = sd.data.sizes.map(sz=>{
          const q = wLogs.reduce((s,l)=>s+(l.qtys[sz.id]||0),0);
          return q ? `${sz.name} ${q}개` : '';
        }).filter(Boolean).join(' / ');
        workerTotal += amt;
        workerQty += qty;
        siteBreakdown.push({name:sd.site.name, color:sd.color, qty, amt, szBreakdown});
      });

      if(!workerTotal) return;

      const uid = 'w_'+worker.replace(/\s/g,'');
      html += `<div class="sum-card">
        <div class="sum-card-header" onclick="toggleSumCard('${uid}')">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="avatar" style="width:36px;height:36px;font-size:13px;">${worker.slice(0,2)}</div>
            <div>
              <div style="font-size:15px;font-weight:700;">${worker}</div>
              <div style="font-size:12px;color:#aaa;">총 ${workerQty}개</div>
            </div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:16px;font-weight:800;color:#185FA5;">${workerTotal.toLocaleString()}원</div>
            <div style="font-size:11px;color:#bbb;">▾ 현장별 보기</div>
          </div>
        </div>
        <div class="sum-card-body" id="${uid}">
          ${siteBreakdown.map(sb=>`
            <div class="sum-worker-row">
              <div>
                <div><span class="sum-site-tag" style="background:${sb.color}18;color:${sb.color};">${sb.name}</span></div>
                <div style="font-size:12px;color:#888;margin-top:2px;">${sb.szBreakdown}</div>
              </div>
              <div style="text-align:right;">
                <div style="font-size:14px;font-weight:700;color:#185FA5;">${sb.amt.toLocaleString()}원</div>
                <div style="font-size:12px;color:#aaa;">${sb.qty}개</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
    });
  }

  // ── 현장별 합산 ──
  html += `<div class="sum-section">🏗️ 현장별 합산</div>`;
  filtered.forEach((sd,i)=>{
    if(!sd.logs.length){ return; }
    const siteTotal = sd.logs.reduce((s,l)=>s+logTotalForData(l,sd.data),0);
    const siteQty = sd.logs.reduce((s,l)=>s+sd.data.sizes.reduce((q,sz)=>q+(l.qtys[sz.id]||0),0),0);
    const uid = 'site_sum_'+i;

    // 현장 내 작업자별
    const wRows = sd.data.workers.map(w=>{
      const wl = sd.logs.filter(l=>l.worker===w);
      if(!wl.length) return '';
      const amt = wl.reduce((s,l)=>s+logTotalForData(l,sd.data),0);
      const qty = wl.reduce((s,l)=>s+sd.data.sizes.reduce((q,sz)=>q+(l.qtys[sz.id]||0),0),0);
      const szB = sd.data.sizes.map(sz=>{
        const q=wl.reduce((s,l)=>s+(l.qtys[sz.id]||0),0);
        return q?`${sz.name} ${q}개`:'';
      }).filter(Boolean).join(' / ');
      return `<div class="sum-worker-row">
        <div>
          <div style="font-size:14px;font-weight:600;">${w}</div>
          <div style="font-size:12px;color:#888;margin-top:2px;">${szB}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:14px;font-weight:700;color:#185FA5;">${amt.toLocaleString()}원</div>
          <div style="font-size:12px;color:#aaa;">${qty}개</div>
        </div>
      </div>`;
    }).join('');

    html += `<div class="sum-card">
      <div class="sum-card-header" onclick="toggleSumCard('${uid}')">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:36px;height:36px;border-radius:10px;background:${sd.color}18;display:flex;align-items:center;justify-content:center;font-size:18px;">🏗️</div>
          <div>
            <div style="font-size:15px;font-weight:700;color:${sd.color};">${sd.site.name}</div>
            <div style="font-size:12px;color:#aaa;">총 ${siteQty}개</div>
          </div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:16px;font-weight:800;color:#185FA5;">${siteTotal.toLocaleString()}원</div>
          <div style="font-size:11px;color:#bbb;">▾ 작업자별 보기</div>
        </div>
      </div>
      <div class="sum-card-body" id="${uid}">${wRows||'<div style="padding:10px 0;font-size:13px;color:#bbb;">작업 없음</div>'}</div>
    </div>`;
  });

  document.getElementById('summary-content').innerHTML = html;
}

function toggleSumCard(uid){
  const el = document.getElementById(uid);
  if(el) el.classList.toggle('open');
}

function renderSiteList(){
  const sites=getSiteList();
  const el=document.getElementById('site-list');
  if(!sites.length){
    el.innerHTML=`<div class="empty"><span>🏗️</span>아직 현장이 없습니다<br>아래 버튼으로 추가하세요</div>`;
    return;
  }
  el.innerHTML=sites.map((s,i)=>{
    const color=SITE_COLORS[i%SITE_COLORS.length];
    const emoji=SITE_EMOJIS[i%SITE_EMOJIS.length];
    const data=getSiteData(s.id);
    const totalLogs=data.logs.length;
    const totalAmt=data.logs.reduce((sum,l)=>sum+logTotalForData(l,data),0);
    return `<div class="site-card" onclick="enterSite('${s.id}')">
      <div class="site-card-left">
        <div class="site-icon" style="background:${color}20;">${emoji}</div>
        <div>
          <div class="site-name" style="color:${color};">${s.name}</div>
          <div class="site-sub">작업 ${totalLogs}건 · ${totalAmt.toLocaleString()}원</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button onclick="event.stopPropagation();deleteSite('${s.id}')" class="site-del-btn">🗑</button>
        <span class="site-arrow">›</span>
      </div>
    </div>`;
  }).join('');
}
function logTotalForData(log,data){
  return data.sizes.reduce((s,sz)=>s+(log.qtys[sz.id]||0)*sz.price,0);
}

function openAddSite(){
  document.getElementById('modal-title').textContent='새 현장 추가';
  document.getElementById('modal-body').innerHTML=`
    <div class="frow"><label>현장명</label><input type="text" id="new-site-name" placeholder="예: ○○ 아파트 현장" autofocus></div>
    <button class="btn btn-p" onclick="addSite()">✅ 현장 추가</button>
  `;
  document.getElementById('modal-overlay').style.display='flex';
  setTimeout(()=>document.getElementById('new-site-name').focus(),100);
}
function addSite(){
  const name=document.getElementById('new-site-name').value.trim();
  if(!name){alert('현장명을 입력해주세요.');return;}
  const sites=getSiteList();
  const id='site_'+Date.now();
  sites.push({id,name});
  saveSiteList(sites);
  closeModal();
  renderSiteList();
}
function deleteSite(id){
  const sites=getSiteList();
  const s=sites.find(x=>x.id===id);
  if(!s||!confirm(`"${s.name}" 현장을 삭제하시겠습니까?
모든 작업 데이터가 삭제됩니다.`))return;
  saveSiteList(sites.filter(x=>x.id!==id));
  try{localStorage.removeItem('meter_site_'+id);}catch(e){}
  renderSiteList();
}

function enterSite(id){
  currentSiteId=id;
  state=getSiteData(id);
  const sites=getSiteList();
  const s=sites.find(x=>x.id===id);
  document.getElementById('app-site-name').textContent=s?s.name:'현장';
  document.getElementById('settings-site-name').value=s?s.name:'';
  document.getElementById('site-screen').style.display='none';
  document.getElementById('app-screen').classList.add('active');
  document.getElementById('input-date').value=todayStr;
  showPage('home');
}
function goSiteSelect(){
  currentSiteId=null; state=null;
  document.getElementById('app-screen').classList.remove('active');
  document.getElementById('site-screen').style.display='flex';
  renderSiteList();
}
function saveSiteName(){
  const name=document.getElementById('settings-site-name').value.trim();
  if(!name){alert('현장명을 입력해주세요.');return;}
  const sites=getSiteList();
  const s=sites.find(x=>x.id===currentSiteId);
  if(s){s.name=name;saveSiteList(sites);}
  document.getElementById('app-site-name').textContent=name;
  alert('✅ 현장명이 저장되었습니다.');
}

// ── 유틸 ──
function save(){saveSiteData();}
function logTotal(log){return state.sizes.reduce((s,sz)=>s+(log.qtys[sz.id]||0)*sz.price,0);}
function logQtyTotal(log){return state.sizes.reduce((s,sz)=>s+(log.qtys[sz.id]||0),0);}
function szColor(i){return COLORS[i%4];}
function fmtDate(d){const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});}
function getRefDate(){
  if(!state.logs||!state.logs.length)return todayStr;
  return state.logs.map(l=>l.date).sort().slice(-1)[0];
}
function getMonday(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const day=d.getDay();
  const diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  return d.toISOString().split('T')[0];
}
function filterByPeriod(logs,period){
  const ref=getRefDate();
  if(period==='today') return logs.filter(l=>l.date===todayStr);
  if(period==='week'){const mon=getMonday(ref);return logs.filter(l=>l.date>=mon&&l.date<=ref);}
  if(period==='month') return logs.filter(l=>l.date.startsWith(ref.slice(0,7))&&l.date<=ref);
  return logs;
}

// ── 페이지 전환 ──
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  ['home','input','logs','pay','settings'].forEach((n,i)=>{if(n===name)document.querySelectorAll('.tab')[i].classList.add('active');});
  if(name==='home')renderHome();
  if(name==='input'){initInput();}
  if(name==='logs'){renderDateLogs(curLogFilter);updateWorkerLogSelect();}
  if(name==='pay')renderPay(curPayFilter);
  if(name==='settings')renderSettings();
}

let curHomeDayFilter='month';
function filterHomeDays(p,btn){
  curHomeDayFilter=p;
  document.querySelectorAll('#page-home .pbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderHomeDays();
}
function renderHome(){
  const ref=getRefDate();
  const ms=ref.slice(0,7);
  const refDt=new Date(ref+'T00:00:00');
  const monthLabel=refDt.toLocaleDateString('ko-KR',{year:'numeric',month:'long'});
  const dayLabel=refDt.toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
  const tl=state.logs.filter(l=>l.date===ref);
  const ml=state.logs.filter(l=>l.date.startsWith(ms)&&l.date<=ref);
  document.getElementById('lbl-today').textContent=dayLabel+' 교체';
  document.getElementById('lbl-month').textContent=monthLabel+' 수량';
  document.getElementById('lbl-pay').textContent=monthLabel+' 지급액';
  document.getElementById('sec-workers').textContent='작업자별 현황 ('+monthLabel+')';
  document.getElementById('m-today').textContent=tl.reduce((s,l)=>s+logQtyTotal(l),0).toLocaleString()+'개';
  document.getElementById('m-month').textContent=ml.reduce((s,l)=>s+logQtyTotal(l),0).toLocaleString()+'개';
  document.getElementById('m-pay').textContent=ml.reduce((s,l)=>s+logTotal(l),0).toLocaleString()+'원';
  document.getElementById('m-total').textContent=state.logs.length.toLocaleString()+'건';
  document.getElementById('home-workers').innerHTML=!state.workers.length
    ?'<div class="empty" style="padding:16px;"><span>👷</span>작업자를 등록해주세요</div>'
    :state.workers.map(w=>{
      const wl=ml.filter(l=>l.worker===w);
      const qty=wl.reduce((s,l)=>s+logQtyTotal(l),0);
      const amt=wl.reduce((s,l)=>s+logTotal(l),0);
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f3f3f3;">
        <div style="display:flex;align-items:center;"><div class="avatar">${w.slice(0,2)}</div>
        <div><div style="font-size:15px;font-weight:700;">${w}</div><div style="font-size:12px;color:#aaa;">${monthLabel} ${qty}개</div></div></div>
        <div style="text-align:right;"><div style="font-size:15px;font-weight:800;color:#185FA5;">${amt.toLocaleString()}원</div><div style="font-size:11px;color:#bbb;">지급 예정</div></div>
      </div>`;
    }).join('');
  renderHomeDays();
}
function renderHomeDays(){
  const logs=filterByPeriod([...state.logs],curHomeDayFilter);
  const el=document.getElementById('home-days');
  if(!logs.length){el.innerHTML='<div class="empty"><span>📅</span>작업 내역이 없습니다</div>';return;}
  const groups={};
  logs.forEach(l=>{if(!groups[l.date])groups[l.date]=[];groups[l.date].push(l);});
  const dates=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  el.innerHTML=dates.map(date=>{
    const dl=groups[date];
    const dAmt=dl.reduce((s,l)=>s+logTotal(l),0);
    const dQty=dl.reduce((s,l)=>s+logQtyTotal(l),0);
    const detail=dl.map(l=>{
      const badges=state.sizes.map((sz,i)=>{const q=l.qtys[sz.id]||0;if(!q)return '';const c=szColor(i);return `<span class="badge" style="background:${c.bg};color:${c.color};">${sz.name} ${q}개</span>`;  }).join('');
      return `<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f8f8f8;">
        <div><div style="font-size:14px;font-weight:600;">${l.worker}</div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">${badges}</div></div>
        <div style="font-size:14px;font-weight:700;color:#185FA5;white-space:nowrap;padding-left:8px;">${logTotal(l).toLocaleString()}원</div>
      </div>`;
    }).join('');
    return `<div class="day-card" onclick="toggleDayDetail(this)">
      <div class="day-header"><div class="day-date">${fmtDate(date)}</div><div style="text-align:right;"><div class="day-total">${dAmt.toLocaleString()}원</div><div style="font-size:11px;color:#aaa;">${dl.length}명 ${dQty}개</div></div></div>
      <div class="day-detail">${detail}</div>
    </div>`;
  }).join('');
}
function toggleDayDetail(el){el.querySelector('.day-detail').classList.toggle('open');}

function initInput(){
  document.getElementById('input-worker').innerHTML='<option value="">— 선택 —</option>'+state.workers.map(w=>`<option value="${w}">${w}</option>`).join('');
  buildSzGrid();
}
function buildSzGrid(){
  document.getElementById('sz-grid').innerHTML=state.sizes.map((sz,i)=>{
    const c=szColor(i);
    return `<div class="sz-card" id="szc-${sz.id}">
      <div class="sz-name" style="color:${c.color};">${sz.name}</div>
      <div class="sz-qty-row">
        <button class="sq-btn" onclick="adjQty('${sz.id}',-1)">－</button>
        <input class="sq-input" type="number" id="qty-${sz.id}" value="0" min="0" inputmode="numeric" onchange="onQtyChange('${sz.id}')">
        <button class="sq-btn" onclick="adjQty('${sz.id}',1)">＋</button>
      </div>
    </div>`;
  }).join('');
  updatePreview();
}
function adjQty(id,delta){const inp=document.getElementById('qty-'+id);inp.value=Math.max(0,(parseInt(inp.value)||0)+delta);onQtyChange(id);}
function onQtyChange(id){const v=parseInt(document.getElementById('qty-'+id).value)||0;document.getElementById('szc-'+id).classList.toggle('has-qty',v>0);updatePreview();}
function getQtys(){const q={};state.sizes.forEach(sz=>{q[sz.id]=parseInt(document.getElementById('qty-'+sz.id).value)||0;});return q;}
function updatePreview(){
  const qtys=getQtys();
  const rows=state.sizes.map((sz,i)=>{const q=qtys[sz.id];if(!q)return '';const c=szColor(i);return `<div class="preview-row"><span><span class="badge" style="background:${c.bg};color:${c.color};">${sz.name}</span> × ${q}개</span><span>${(sz.price*q).toLocaleString()}원</span></div>`;  }).filter(Boolean);
  const total=state.sizes.reduce((s,sz)=>s+(qtys[sz.id]||0)*sz.price,0);
  const box=document.getElementById('preview-box');
  if(rows.length){document.getElementById('preview-rows').innerHTML=rows.join('')+`<div class="preview-row total"><span>합계</span><span>${total.toLocaleString()}원</span></div>`;box.style.display='block';}
  else box.style.display='none';
}
function addLog(){
  const date=document.getElementById('input-date').value;
  const worker=document.getElementById('input-worker').value;
  const qtys=getQtys();
  const totalQty=Object.values(qtys).reduce((s,v)=>s+v,0);
  if(!date||!worker){alert('날짜와 작업자를 선택해주세요.');return;}
  if(!totalQty){alert('수량을 1개 이상 입력해주세요.');return;}
  const existing=state.logs.find(l=>l.date===date&&l.worker===worker);
  if(existing){if(!confirm(`${worker}의 ${date} 내역이 이미 있습니다.\n수량을 추가하시겠습니까?`))return;state.sizes.forEach(sz=>{existing.qtys[sz.id]=(existing.qtys[sz.id]||0)+(qtys[sz.id]||0);});}
  else state.logs.push({id:Date.now(),date,worker,qtys});
  save();
  state.sizes.forEach(sz=>{document.getElementById('qty-'+sz.id).value=0;document.getElementById('szc-'+sz.id).classList.remove('has-qty');});
  document.getElementById('preview-box').style.display='none';
  const total=state.sizes.reduce((s,sz)=>s+(qtys[sz.id]||0)*sz.price,0);
  alert(`✅ 등록 완료!\n${worker} / 총 ${totalQty}개\n${total.toLocaleString()}원`);
}

  document.getElementById('modal-title').textContent=`수정 — ${log.worker} (${log.date})`;
  document.getElementById('modal-body').innerHTML=state.sizes.map((sz,i)=>{
    const c=szColor(i);const q=log.qtys[sz.id]||0;

      <span class="badge" style="background:${c.bg};color:${c.color};font-size:13px;padding:5px 12px;">${sz.name}</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="sq-btn" onclick="adjModal('m-${sz.id}',-1)">－</button>
        <input class="sq-input" id="m-${sz.id}" type="number" value="${q}" min="0" inputmode="numeric" style="width:70px;">
        <button class="sq-btn" onclick="adjModal('m-${sz.id}',1)">＋</button>
      </div></div>`;
  }).join('')+`<button class="btn btn-p" style="margin-top:16px;" onclick="saveEdit(${id})">💾 저장</button>`;

}
function adjModal(inputId,delta){const inp=document.getElementById(inputId);inp.value=Math.max(0,(parseInt(inp.value)||0)+delta);}
function saveEdit(id){
  const log=state.logs.find(l=>l.id===id);if(!log)return;
  const newQtys={};state.sizes.forEach(sz=>{newQtys[sz.id]=parseInt(document.getElementById('m-'+sz.id).value)||0;});
  if(!Object.values(newQtys).reduce((s,v)=>s+v,0)){if(!confirm('수량이 모두 0입니다. 삭제하시겠습니까?'))return;state.logs=state.logs.filter(l=>l.id!==id);}
  else log.qtys=newQtys;
  save();closeModal();renderDateLogs(curLogFilter);renderWorkerLogs();renderHome();
}
function closeModal(e){if(e&&e.target!==document.getElementById('modal-overlay'))return;document.getElementById('modal-overlay').style.display='none';}

// ── 지급 ──
let curPayFilter='month';
function filterPay(p,btn){
  curPayFilter=p;
  document.querySelectorAll('#page-pay .pbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  const rangeEl=document.getElementById('pay-date-range');
  if(p==='custom'){rangeEl.style.display='block';const ref=getRefDate();if(!document.getElementById('pay-from').value)document.getElementById('pay-from').value=ref.slice(0,7)+'-01';if(!document.getElementById('pay-to').value)document.getElementById('pay-to').value=ref;}
  else rangeEl.style.display='none';
  renderPay(p);
}
function getPayLogs(period){
  if(period==='custom'){const from=document.getElementById('pay-from').value;const to=document.getElementById('pay-to').value;if(!from||!to)return[];return state.logs.filter(l=>l.date>=from&&l.date<=to);}
  return filterByPeriod([...state.logs],period);
}
function renderPay(period){
  const logs=getPayLogs(period);
  const total=logs.reduce((s,l)=>s+logTotal(l),0);
  const ref=getRefDate();
  const monthLabel=new Date(ref+'T00:00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long'});
  let periodLabel=period==='all'?'전체':period==='month'?monthLabel:'';
  if(period==='custom'){const from=document.getElementById('pay-from').value;const to=document.getElementById('pay-to').value;if(from&&to){const fd=new Date(from+'T00:00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric'});const td=new Date(to+'T00:00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric'});periodLabel=fd+' ~ '+td;}}
  let html=`<div class="total-card"><div class="total-label">${periodLabel} 총 지급액</div><div class="total-val">${total.toLocaleString()}원</div></div>`;
  if(period==='custom'&&logs.length){
    const groups={};logs.forEach(l=>{if(!groups[l.date])groups[l.date]=[];groups[l.date].push(l);});
    const dates=Object.keys(groups).sort();
    html+=`<div class="sec">작업일별 내역</div>`;
    dates.forEach(date=>{
      const dl=groups[date];const dAmt=dl.reduce((s,l)=>s+logTotal(l),0);const dQty=dl.reduce((s,l)=>s+logQtyTotal(l),0);
      html+=`<div style="background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><span style="font-size:14px;font-weight:700;color:#555;">${fmtDate(date)}</span><span style="font-size:13px;color:#aaa;">${dQty}개 · ${dAmt.toLocaleString()}원</span></div>`;
      dl.forEach(l=>{const badges=state.sizes.map((sz,i)=>{const q=l.qtys[sz.id]||0;if(!q)return '';const c=szColor(i);return `<span class="badge" style="background:${c.bg};color:${c.color};">${sz.name} ${q}개</span>`;  }).join('');html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-top:1px solid #f5f5f5;"><div><span style="font-size:13px;font-weight:600;">${l.worker}</span><div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;">${badges}</div></div><span style="font-size:13px;font-weight:700;color:#185FA5;">${logTotal(l).toLocaleString()}원</span></div>`;  });
      html+=`</div>`;
    });
    html+=`<div class="sec">작업자별 합계</div>`;
  }
  state.workers.forEach(w=>{
    const wl=logs.filter(l=>l.worker===w);
    const qty=wl.reduce((s,l)=>s+logQtyTotal(l),0);
    const amt=wl.reduce((s,l)=>s+logTotal(l),0);
    const breakdown=state.sizes.map((sz,i)=>{const c=szColor(i);const q=wl.reduce((s,l)=>s+(l.qtys[sz.id]||0),0);if(!q)return '';return `<span class="badge" style="background:${c.bg};color:${c.color};margin:2px;">${sz.name} ${q}개 · ${(q*sz.price).toLocaleString()}원</span>`;  }).join('');
    html+=`<div class="pay-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;"><div><div style="font-size:16px;font-weight:700;">${w}</div><div style="font-size:12px;color:#aaa;margin:3px 0;">총 ${qty}개</div><div style="display:flex;flex-wrap:wrap;">${breakdown||'<span style="font-size:12px;color:#ccc;">작업 없음</span>'}</div></div><div style="font-size:20px;font-weight:800;color:#185FA5;padding-left:8px;">${amt.toLocaleString()}원</div></div></div>`;
  });
  document.getElementById('pay-summary').innerHTML=html;
  document.getElementById('pay-export-btn').style.display=logs.length?'block':'none';
}
function exportPDF(){
  const logs=getPayLogs(curPayFilter);if(!logs.length){alert('내보낼 데이터가 없습니다.');return;}
  const sites=getSiteList();const site=sites.find(x=>x.id===currentSiteId);const siteName=site?site.name:'현장';
  const ref=getRefDate();let periodLabel='전체 기간';
  if(curPayFilter==='month') periodLabel=new Date(ref+'T00:00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long'});
  else if(curPayFilter==='custom'){const from=document.getElementById('pay-from').value;const to=document.getElementById('pay-to').value;const fd=new Date(from+'T00:00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});const td=new Date(to+'T00:00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});periodLabel=fd+' ~ '+td;}
  const totalAmt=logs.reduce((s,l)=>s+logTotal(l),0);
  const groups={};logs.forEach(l=>{if(!groups[l.date])groups[l.date]=[];groups[l.date].push(l);});
  const dates=Object.keys(groups).sort();
  let dateRows='';
  dates.forEach(date=>{
    const dl=groups[date];
    dl.forEach((l,i)=>{
      const szCells=state.sizes.map(sz=>`<td style="text-align:right;padding:6px 8px;">${l.qtys[sz.id]||0}</td>`).join('');
      const dateCell=i===0?`<td rowspan="${dl.length}" style="text-align:center;padding:6px 8px;border-right:1px solid #ddd;font-weight:600;background:#f9f9f9;">${new Date(date+'T00:00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric'})}</td>`:'';
      dateRows+=`<tr style="border-bottom:1px solid #eee;">${dateCell}<td style="padding:6px 8px;">${l.worker}</td>${szCells}<td style="text-align:right;padding:6px 8px;font-weight:700;color:#185FA5;">${logTotal(l).toLocaleString()}원</td></tr>`;
    });
  });
  let workerRows='';
  state.workers.forEach(w=>{
    const wl=logs.filter(l=>l.worker===w);if(!wl.length)return;
    const szCells=state.sizes.map(sz=>`<td style="text-align:right;padding:6px 8px;">${wl.reduce((s,l)=>s+(l.qtys[sz.id]||0),0)}</td>`).join('');
    workerRows+=`<tr style="border-bottom:1px solid #eee;"><td style="padding:6px 8px;font-weight:600;">${w}</td>${szCells}<td style="text-align:right;padding:6px 8px;font-weight:700;color:#185FA5;">${wl.reduce((s,l)=>s+logTotal(l),0).toLocaleString()}원</td></tr>`;
  });
  const sizeHeaders=state.sizes.map(sz=>`<th style="padding:8px;background:#185FA5;color:#fff;text-align:center;">${sz.name}</th>`).join('');
  const pdfHTML=`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>지급내역_${siteName}</title>
  <style>body{font-family:'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif;margin:0;padding:20px;color:#1a1a1a;font-size:13px;}h1{font-size:20px;font-weight:700;color:#185FA5;margin:0 0 4px;}table{width:100%;border-collapse:collapse;margin-bottom:24px;}th{padding:8px;background:#185FA5;color:#fff;text-align:center;font-size:12px;}td{font-size:12px;}.section-title{font-size:14px;font-weight:700;color:#185FA5;margin:20px 0 8px;padding-bottom:6px;border-bottom:2px solid #185FA5;}.total-box{background:#f0f6ff;border:2px solid #185FA5;border-radius:8px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}.total-box .tv{font-size:24px;font-weight:800;color:#185FA5;}@media print{button{display:none!important;}}</style></head><body>
  <div style="text-align:right;font-size:12px;color:#999;margin-bottom:8px;">출력일: ${new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})}</div>
  <h1>💧 ${siteName} · 지급 내역</h1><div style="font-size:13px;color:#666;margin-bottom:16px;">기간: ${periodLabel}</div>
  <div class="total-box"><div style="font-size:13px;color:#555;">총 지급액</div><div class="tv">${totalAmt.toLocaleString()}원</div></div>
  <div class="section-title">📅 작업일별 상세</div>
  <table><thead><tr><th style="width:90px;">작업일</th><th style="width:70px;">작업자</th>${sizeHeaders}<th>지급액</th></tr></thead><tbody>${dateRows}</tbody></table>
  <div class="section-title">👷 작업자별 합계</div>
  <table><thead><tr><th style="width:80px;">작업자</th>${sizeHeaders}<th>합계</th></tr></thead><tbody>${workerRows}</tbody></table>
  <div style="text-align:center;margin-top:30px;"><button onclick="window.print()" style="padding:12px 32px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;">🖨️ 인쇄 / PDF 저장</button></div>
  </body></html>`;
  const blob=new Blob([pdfHTML],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const win=window.open(url,'_blank');
  if(!win){const a=document.createElement('a');a.href=url;a.download='지급내역_'+siteName+'.html';a.click();}
  setTimeout(()=>URL.revokeObjectURL(url),60000);
}

let pendingPrices={};
function renderSettings(){
  document.getElementById('worker-list').innerHTML=!state.workers.length
    ?'<div style="font-size:13px;color:#ccc;padding:8px 0;">등록된 작업자가 없습니다</div>'

        <button onclick="removeWorker(${i})" class="site-del-btn">🗑</button></div>`).join('');
  pendingPrices={};state.sizes.forEach(sz=>{pendingPrices[sz.id]=sz.price;});
  document.getElementById('price-list').innerHTML=state.sizes.map((sz,i)=>{
    const c=szColor(i);
    return `<div class="price-row" id="prow-${sz.id}">
      <span class="badge" style="background:${c.bg};color:${c.color};font-size:13px;padding:6px 13px;">${sz.name}</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <input type="number" id="pinput-${sz.id}" style="width:120px;text-align:right;padding:9px 11px;border:1.5px solid #e5e5e5;border-radius:10px;font-size:14px;background:#fafafa;font-weight:600;" value="${sz.price}" inputmode="numeric" oninput="onPriceInput('${sz.id}',this.value)">
        <span style="font-size:13px;color:#aaa;">원/개</span>
      </div></div>`;
  }).join('')+`<div id="price-save-bar" style="display:none;margin-top:14px;padding-top:14px;border-top:1.5px solid #f0f0f0;">
    <div style="font-size:12px;color:#854F0B;background:#FAEEDA;border-radius:8px;padding:8px 12px;margin-bottom:10px;">⚠️ 변경된 단가가 있습니다. 저장하면 모든 금액에 적용됩니다.</div>
    <div style="display:flex;gap:8px;"><button class="btn btn-o btn-sm" style="flex:1;" onclick="cancelPriceEdit()">취소</button><button class="btn btn-p btn-sm" style="flex:2;" onclick="savePrices()">✅ 저장 · 금액 적용</button></div>
  </div>`;
}
function onPriceInput(id,val){pendingPrices[id]=parseInt(val)||0;const changed=state.sizes.some(sz=>pendingPrices[sz.id]!==sz.price);document.getElementById('price-save-bar').style.display=changed?'block':'none';}
function cancelPriceEdit(){state.sizes.forEach(sz=>{const inp=document.getElementById('pinput-'+sz.id);if(inp)inp.value=sz.price;pendingPrices[sz.id]=sz.price;});document.getElementById('price-save-bar').style.display='none';}
function savePrices(){
  const changes=state.sizes.filter(sz=>pendingPrices[sz.id]!==sz.price);if(!changes.length)return;
  const desc=changes.map(sz=>`• ${sz.name}: ${sz.price.toLocaleString()}원 → ${pendingPrices[sz.id].toLocaleString()}원`).join('\n');
  if(!confirm(`아래 단가를 변경할까요?\n\n${desc}`))return;
  state.sizes.forEach(sz=>{sz.price=pendingPrices[sz.id];});save();
  document.getElementById('price-save-bar').style.display='none';
  alert(`✅ 단가가 저장되었습니다.\n\n${desc}`);
  renderSettings();renderHome();
}
function addWorker(){
  const n=document.getElementById('new-worker').value.trim();if(!n)return;
  if(state.workers.includes(n)){alert('이미 등록된 작업자입니다.');return;}
  state.workers.push(n);save();document.getElementById('new-worker').value='';renderSettings();
}
function removeWorker(i){if(!confirm(`"${state.workers[i]}"을(를) 삭제하시겠습니까?`))return;state.workers.splice(i,1);save();renderSettings();}
function clearData(){
  if(!confirm('이 현장의 모든 데이터를 초기화하시겠습니까?\n작업 내역이 모두 삭제됩니다.'))return;
  state={workers:[],sizes:[{id:'s1',name:'13mm',price:14000},{id:'s2',name:'20mm',price:14000},{id:'s3',name:'25mm',price:14000},{id:'s4',name:'32mm',price:14000},{id:'s5',name:'40mm',price:14000},{id:'s6',name:'50mm',price:14000},{id:'s7',name:'기타',price:14000}],logs:[]};
  save();showPage('home');renderSettings();
}

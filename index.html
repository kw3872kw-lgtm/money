<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#f2f4f7;color:#1a1a1a;max-width:480px;margin:0 auto;min-height:100vh;}
.header{background:#185FA5;padding:env(safe-area-inset-top,16px) 16px 14px;padding-top:calc(env(safe-area-inset-top,0px) + 16px);}
.header h1{font-size:20px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;}
.header p{font-size:12px;color:rgba(255,255,255,0.75);margin-top:3px;}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:99;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.tab{flex:1;padding:10px 4px 8px;font-size:10px;text-align:center;border:none;background:none;color:#aaa;cursor:pointer;border-bottom:2.5px solid transparent;transition:all 0.15s;}
.tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:700;}
.tab-icon{font-size:21px;display:block;margin-bottom:2px;}
.page{display:none;padding:14px 14px 40px;}
.page.active{display:block;}
.section-title{font-size:11px;font-weight:700;color:#999;margin:14px 0 7px;text-transform:uppercase;letter-spacing:0.6px;}
.card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.metric{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.metric-label{font-size:11px;color:#999;margin-bottom:5px;font-weight:500;}
.metric-value{font-size:22px;font-weight:800;color:#1a1a1a;}
.metric-value.blue{color:#185FA5;}
label{font-size:13px;color:#666;display:block;margin-bottom:5px;font-weight:500;}
select,input[type="number"],input[type="date"],input[type="text"]{width:100%;padding:12px 14px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:15px;background:#fafafa;color:#1a1a1a;outline:none;-webkit-appearance:none;appearance:none;}
select:focus,input:focus{border-color:#185FA5;background:#fff;}
.form-row{margin-bottom:14px;}
.btn{width:100%;padding:15px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;border:none;margin-top:8px;transition:all 0.1s;}
.btn-primary{background:#185FA5;color:#fff;}
.btn-primary:active{background:#0C447C;transform:scale(0.98);}
.btn-outline{background:#fff;color:#185FA5;border:1.5px solid #185FA5;}
.btn-sm{padding:9px 14px;font-size:13px;width:auto;border-radius:10px;}
.worker-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f3f3f3;}
.worker-row:last-child{border-bottom:none;}
.avatar{width:40px;height:40px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#185FA5;flex-shrink:0;margin-right:11px;}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.size-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
.size-btn{padding:17px 10px;border-radius:14px;border:1.5px solid #e5e5e5;background:#fafafa;cursor:pointer;text-align:center;transition:all 0.15s;-webkit-appearance:none;}
.size-btn.selected{border-color:#185FA5;background:#E6F1FB;box-shadow:0 0 0 3px rgba(24,95,165,0.12);}
.size-btn .sname{font-size:16px;font-weight:700;color:#1a1a1a;}
.size-btn.selected .sname{color:#0C447C;}
.size-btn .sprice{font-size:12px;color:#999;margin-top:3px;}
.size-btn.selected .sprice{color:#185FA5;font-weight:600;}
.preview-box{background:linear-gradient(135deg,#E6F1FB,#d0e8fa);border-radius:12px;padding:13px 16px;margin-top:10px;display:none;align-items:center;justify-content:space-between;}
.preview-box span{font-size:13px;color:#185FA5;font-weight:500;}
.preview-box strong{font-size:20px;font-weight:800;color:#0C447C;}
.log-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.06);display:flex;justify-content:space-between;align-items:flex-start;}
.log-date{font-size:11px;color:#bbb;font-weight:500;}
.log-worker{font-size:15px;font-weight:700;margin:3px 0;}
.log-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.log-amount{font-size:16px;font-weight:800;color:#185FA5;text-align:right;}
.del-btn{background:none;border:none;color:#ddd;cursor:pointer;padding:4px;font-size:20px;display:block;margin-top:6px;}
.del-btn:active{color:#E24B4A;}
.total-card{background:linear-gradient(135deg,#185FA5,#0C447C);border-radius:16px;padding:20px;margin-bottom:12px;}
.total-label{font-size:13px;color:rgba(255,255,255,0.8);margin-bottom:5px;font-weight:500;}
.total-value{font-size:32px;font-weight:800;color:#fff;}
.pay-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.06);display:flex;justify-content:space-between;align-items:flex-start;}
.pay-amount{font-size:20px;font-weight:800;color:#185FA5;white-space:nowrap;padding-left:8px;}
.price-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f3f3f3;}
.price-row:last-child{border-bottom:none;}
.price-input{width:120px;text-align:right;padding:9px 11px;border:1.5px solid #e5e5e5;border-radius:10px;font-size:14px;background:#fafafa;font-weight:600;}
.period-bar{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;}
.pbtn{padding:7px 15px;border-radius:99px;font-size:13px;border:1.5px solid #e5e5e5;background:#fff;color:#888;cursor:pointer;font-weight:500;}
.pbtn.active{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:700;}
.empty{text-align:center;padding:44px 16px;color:#ccc;}
.empty-icon{font-size:42px;display:block;margin-bottom:10px;}
.add-row{display:flex;gap:8px;margin-top:12px;align-items:center;}
.add-row input{flex:1;margin-bottom:0;}
.install-banner{background:linear-gradient(135deg,#185FA5,#1a6fbf);margin:14px 14px 0;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.install-banner .ib-icon{font-size:28px;}
.install-banner .ib-text{flex:1;}
.install-banner .ib-title{font-size:14px;font-weight:700;color:#fff;}
.install-banner .ib-sub{font-size:11px;color:rgba(255,255,255,0.8);margin-top:2px;}
.install-banner .ib-btn{background:rgba(255,255,255,0.22);border:none;border-radius:10px;padding:8px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
</style>

<body>

<div class="header">
  <h1>💧 계량기 교체 관리</h1>
  <p id="today-date"></p>
</div>

<div id="install-banner" class="install-banner" style="display:none;">
  <span class="ib-icon">📲</span>
  <div class="ib-text">
    <div class="ib-title">앱으로 설치하기</div>
    <div class="ib-sub">홈 화면에 추가하면 앱처럼 사용 가능</div>
  </div>
  <button class="ib-btn" id="install-btn" onclick="installApp()">설치</button>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="showPage('home')"><span class="tab-icon">🏠</span>홈</button>
  <button class="tab" onclick="showPage('input')"><span class="tab-icon">✏️</span>입력</button>
  <button class="tab" onclick="showPage('logs')"><span class="tab-icon">📋</span>내역</button>
  <button class="tab" onclick="showPage('pay')"><span class="tab-icon">💰</span>지급</button>
  <button class="tab" onclick="showPage('settings')"><span class="tab-icon">⚙️</span>설정</button>
</div>

<!-- 홈 -->
<div id="page-home" class="page active">
  <div class="metric-grid" style="margin-top:4px;">
    <div class="metric"><div class="metric-label">오늘 교체 수량</div><div class="metric-value blue" id="m-today">0개</div></div>
    <div class="metric"><div class="metric-label">이번 달 수량</div><div class="metric-value" id="m-month">0개</div></div>
    <div class="metric"><div class="metric-label">이번 달 지급액</div><div class="metric-value blue" style="font-size:17px;" id="m-pay">0원</div></div>
    <div class="metric"><div class="metric-label">총 작업 건수</div><div class="metric-value" id="m-total">0건</div></div>
  </div>
  <div class="section-title">이번 달 구경별 현황</div>
  <div class="card" id="size-summary"></div>
  <div class="section-title">작업자별 현황</div>
  <div class="card" id="worker-summary"></div>
</div>

<!-- 입력 -->
<div id="page-input" class="page">
  <div class="section-title" style="margin-top:0;">작업 내역 입력</div>
  <div class="card">
    <div class="form-row"><label>작업일</label><input type="date" id="input-date"></div>
    <div class="form-row"><label>작업자</label><select id="input-worker"><option value="">— 선택 —</option></select></div>
    <div class="form-row">
      <label>계량기 구경</label>
      <div class="size-grid" id="size-grid"></div>
      <input type="hidden" id="input-size">
    </div>
    <div class="form-row"><label>교체 수량</label><input type="number" id="input-qty" min="1" placeholder="개수 입력" inputmode="numeric"></div>
    <div class="preview-box" id="preview-box">
      <span>예상 금액</span><strong id="preview-amt"></strong>
    </div>
    <button class="btn btn-primary" onclick="addLog()">✅ 작업 등록</button>
  </div>
</div>

<!-- 내역 -->
<div id="page-logs" class="page">
  <div class="period-bar">
    <button class="pbtn active" onclick="filterLogs('all',this)">전체</button>
    <button class="pbtn" onclick="filterLogs('today',this)">오늘</button>
    <button class="pbtn" onclick="filterLogs('week',this)">이번 주</button>
    <button class="pbtn" onclick="filterLogs('month',this)">이번 달</button>
  </div>
  <div id="log-list"></div>
</div>

<!-- 지급 -->
<div id="page-pay" class="page">
  <div class="period-bar">
    <button class="pbtn active" onclick="filterPay('month',this)">이번 달</button>
    <button class="pbtn" onclick="filterPay('all',this)">전체</button>
  </div>
  <div id="pay-summary"></div>
</div>

<!-- 설정 -->
<div id="page-settings" class="page">
  <div class="section-title" style="margin-top:0;">작업자 관리</div>
  <div class="card">
    <div id="worker-list"></div>
    <div class="add-row"><input type="text" id="new-worker" placeholder="작업자 이름 입력"><button class="btn btn-outline btn-sm" onclick="addWorker()">추가</button></div>
  </div>
  <div class="section-title">구경별 단가 설정</div>
  <div class="card" id="price-list"></div>
  <div class="section-title">앱 정보</div>
  <div class="card" style="font-size:13px;color:#999;line-height:1.8;">
    <div>버전: 1.0.0</div>
    <div>상수도 계량기 교체 작업 관리 PWA</div>
    <div style="margin-top:8px;"><button class="btn btn-outline btn-sm" onclick="clearData()" style="color:#E24B4A;border-color:#E24B4A;">데이터 초기화</button></div>
  </div>
</div>

<script>
// ── Service Worker 등록 ──
const SW_CODE = `
const CACHE = 'meter-v1';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./'])));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(()=>caches.match('./'))));
});
`;
if('serviceWorker' in navigator) {
  const blob = new Blob([SW_CODE], {type:'text/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

const manifest = {
  name:"계량기 교체 관리", short_name:"계량기관리",
  description:"상수도 계량기 교체 작업 수량 및 지급금액 관리",
  start_url:"./", display:"standalone", orientation:"portrait",
  background_color:"#185FA5", theme_color:"#185FA5", lang:"ko", icons
};
const mblob = new Blob([JSON.stringify(manifest)],{type:'application/json'});
const murl = URL.createObjectURL(mblob);
const ml = document.createElement('link');
ml.rel='manifest'; ml.href=murl;
document.head.appendChild(ml);

// ── 설치 배너 ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-banner').style.display='flex';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display='none';
});
function installApp() {
  if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').style.display='none';}); }
}

// ── 앱 데이터 ──
const today = new Date();
const todayStr = today.toISOString().split('T')[0];
document.getElementById('today-date').textContent = today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
document.getElementById('input-date').value = todayStr;

const COLORS = [
  {bg:'#E6F1FB',color:'#0C447C'},
  {bg:'#EAF3DE',color:'#3B6D11'},
  {bg:'#FAEEDA',color:'#854F0B'},
  {bg:'#FAECE7',color:'#993C1D'}
];

let state = (()=>{
  try{const s=localStorage.getItem('meterapp');if(s)return JSON.parse(s);}catch(e){}
  return {
    workers:['김철수','이영희','박민준','최수진','정우성'],
    sizes:[
      {id:'s1',name:'13mm',price:8000},
      {id:'s2',name:'20~32mm',price:12000},
      {id:'s3',name:'40~50mm',price:20000},
      {id:'s4',name:'기타',price:15000}
    ],
    logs:[]
  };
})();

function save(){try{localStorage.setItem('meterapp',JSON.stringify(state));}catch(e){}}
function calcAmt(log){const s=state.sizes.find(x=>x.id===log.sizeId);return s?s.price*log.qty:0;}
function szColor(id){const i=state.sizes.findIndex(s=>s.id===id);return COLORS[i<0?0:i%4];}

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const tabs=['home','input','logs','pay','settings'];
  document.querySelectorAll('.tab')[tabs.indexOf(name)].classList.add('active');
  if(name==='home')renderHome();
  if(name==='input'){buildWorkerSelect();buildSizeGrid();}
  if(name==='logs')renderLogs(curLogFilter);
  if(name==='pay')renderPay(curPayFilter);
  if(name==='settings')renderSettings();
}

function renderHome(){
  const ms=todayStr.slice(0,7);
  const tl=state.logs.filter(l=>l.date===todayStr);
  const ml=state.logs.filter(l=>l.date.startsWith(ms));
  document.getElementById('m-today').textContent=tl.reduce((s,l)=>s+l.qty,0).toLocaleString()+'개';
  document.getElementById('m-month').textContent=ml.reduce((s,l)=>s+l.qty,0).toLocaleString()+'개';
  document.getElementById('m-pay').textContent=ml.reduce((s,l)=>s+calcAmt(l),0).toLocaleString()+'원';
  document.getElementById('m-total').textContent=state.logs.length.toLocaleString()+'건';
  document.getElementById('size-summary').innerHTML=state.sizes.map((sz,i)=>{
    const c=COLORS[i%4];
    const q=ml.filter(l=>l.sizeId===sz.id).reduce((s,l)=>s+l.qty,0);
    return `<div class="worker-row">
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="badge" style="background:${c.bg};color:${c.color};">${sz.name}</span>
        <span style="font-size:12px;color:#aaa;">${sz.price.toLocaleString()}원/개</span>
      </div>
      <div style="text-align:right;">
        <span style="font-size:15px;font-weight:700;">${q}개</span>
        <span style="font-size:12px;color:#aaa;margin-left:5px;">${(q*sz.price).toLocaleString()}원</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('worker-summary').innerHTML=state.workers.length===0
    ?'<div class="empty"><span class="empty-icon">👷</span>작업자를 등록해주세요</div>'
    :state.workers.map(w=>{
        const wl=ml.filter(l=>l.worker===w);
        const qty=wl.reduce((s,l)=>s+l.qty,0);
        const amt=wl.reduce((s,l)=>s+calcAmt(l),0);
        return `<div class="worker-row">
          <div style="display:flex;align-items:center;">
            <div class="avatar">${w.slice(0,2)}</div>
            <div><div style="font-size:15px;font-weight:700;">${w}</div><div style="font-size:12px;color:#aaa;">이번 달 ${qty}개</div></div>
          </div>
          <div style="text-align:right;"><div style="font-size:15px;font-weight:800;color:#185FA5;">${amt.toLocaleString()}원</div><div style="font-size:11px;color:#bbb;">지급 예정</div></div>
        </div>`;
      }).join('');
}

function buildWorkerSelect(){
  document.getElementById('input-worker').innerHTML='<option value="">— 선택 —</option>'+state.workers.map(w=>`<option value="${w}">${w}</option>`).join('');
}
function buildSizeGrid(){
  const sel=document.getElementById('input-size').value;
  document.getElementById('size-grid').innerHTML=state.sizes.map((sz,i)=>{
    const isSel=sel===sz.id;
    return `<button class="size-btn${isSel?' selected':''}" onclick="selectSize('${sz.id}')" type="button">
      <div class="sname">${sz.name}</div>
      <div class="sprice">${sz.price.toLocaleString()}원/개</div>
    </button>`;
  }).join('');
  updatePreview();
}
function selectSize(id){document.getElementById('input-size').value=id;buildSizeGrid();}
function updatePreview(){
  const id=document.getElementById('input-size').value;
  const qty=parseInt(document.getElementById('input-qty').value)||0;
  const box=document.getElementById('preview-box');
  if(id&&qty>0){const sz=state.sizes.find(s=>s.id===id);if(sz){document.getElementById('preview-amt').textContent=(sz.price*qty).toLocaleString()+'원';box.style.display='flex';return;}}
  box.style.display='none';
}
document.getElementById('input-qty').addEventListener('input',updatePreview);

function addLog(){
  const date=document.getElementById('input-date').value;
  const worker=document.getElementById('input-worker').value;
  const sizeId=document.getElementById('input-size').value;
  const qty=parseInt(document.getElementById('input-qty').value);
  if(!date||!worker||!sizeId||!qty||qty<1){alert('모든 항목을 입력해주세요.');return;}
  const sz=state.sizes.find(s=>s.id===sizeId);
  state.logs.push({id:Date.now(),date,worker,sizeId,qty});
  save();
  document.getElementById('input-qty').value='';
  document.getElementById('input-size').value='';
  document.getElementById('preview-box').style.display='none';
  buildSizeGrid();
  alert(`✅ 등록 완료!\n${worker} / ${sz.name} / ${qty}개\n${(sz.price*qty).toLocaleString()}원`);
}

let curLogFilter='all';
function filterLogs(p,btn){curLogFilter=p;document.querySelectorAll('#page-logs .pbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderLogs(p);}
function renderLogs(period){
  let logs=[...state.logs];
  if(period==='today')logs=logs.filter(l=>l.date===todayStr);
  else if(period==='week'){const d=new Date(today);d.setDate(d.getDate()-6);logs=logs.filter(l=>l.date>=d.toISOString().split('T')[0]);}
  else if(period==='month')logs=logs.filter(l=>l.date.startsWith(todayStr.slice(0,7)));
  logs.sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.getElementById('log-list');
  if(!logs.length){el.innerHTML='<div class="empty"><span class="empty-icon">📋</span>작업 내역이 없습니다</div>';return;}
  el.innerHTML=logs.map(l=>{
    const sz=state.sizes.find(s=>s.id===l.sizeId);
    const c=szColor(l.sizeId);
    return `<div class="log-card">
      <div>
        <div class="log-date">${l.date}</div>
        <div class="log-worker">${l.worker}</div>
        <div class="log-badges">
          <span class="badge" style="background:${c.bg};color:${c.color};">${sz?sz.name:'?'}</span>
          <span class="badge" style="background:#EAF3DE;color:#3B6D11;">${l.qty}개</span>
        </div>
      </div>
      <div style="text-align:right;">
        <div class="log-amount">${calcAmt(l).toLocaleString()}원</div>
        <button class="del-btn" onclick="deleteLog(${l.id})">🗑</button>
      </div>
    </div>`;
  }).join('');
}
function deleteLog(id){if(!confirm('이 내역을 삭제하시겠습니까?'))return;state.logs=state.logs.filter(l=>l.id!==id);save();renderLogs(curLogFilter);}

let curPayFilter='month';
function filterPay(p,btn){curPayFilter=p;document.querySelectorAll('#page-pay .pbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderPay(p);}
function renderPay(period){
  let logs=[...state.logs];
  if(period==='month')logs=logs.filter(l=>l.date.startsWith(todayStr.slice(0,7)));
  const total=logs.reduce((s,l)=>s+calcAmt(l),0);
  let html=`<div class="total-card"><div class="total-label">${period==='month'?'이번 달':'전체'} 총 지급액</div><div class="total-value">${total.toLocaleString()}원</div></div>`;
  state.workers.forEach(w=>{
    const wl=logs.filter(l=>l.worker===w);
    const qty=wl.reduce((s,l)=>s+l.qty,0);
    const amt=wl.reduce((s,l)=>s+calcAmt(l),0);
    const breakdown=state.sizes.map((sz,i)=>{
      const c=COLORS[i%4];const q=wl.filter(l=>l.sizeId===sz.id).reduce((s,l)=>s+l.qty,0);
      if(!q)return '';
      return `<span class="badge" style="background:${c.bg};color:${c.color};margin:2px;">${sz.name} ${q}개</span>`;
    }).join('');
    html+=`<div class="pay-card">
      <div>
        <div style="font-size:16px;font-weight:700;">${w}</div>
        <div style="font-size:12px;color:#aaa;margin:3px 0;">총 ${qty}개</div>
        <div style="display:flex;flex-wrap:wrap;">${breakdown||'<span style="font-size:12px;color:#ccc;">작업 없음</span>'}</div>
      </div>
      <div class="pay-amount">${amt.toLocaleString()}원</div>
    </div>`;
  });
  document.getElementById('pay-summary').innerHTML=html;
}

function renderSettings(){
  document.getElementById('worker-list').innerHTML=state.workers.length===0
    ?'<div style="font-size:13px;color:#ccc;padding:8px 0;">등록된 작업자가 없습니다</div>'
    :state.workers.map((w,i)=>`<div class="worker-row">
        <div style="display:flex;align-items:center;gap:10px;"><div class="avatar">${w.slice(0,2)}</div><span style="font-size:15px;font-weight:600;">${w}</span></div>
        <button onclick="removeWorker(${i})" style="background:none;border:none;font-size:22px;color:#ddd;cursor:pointer;">🗑</button>
      </div>`).join('');
  document.getElementById('price-list').innerHTML=state.sizes.map((sz,i)=>{
    const c=COLORS[i%4];
    return `<div class="price-row">
      <span class="badge" style="background:${c.bg};color:${c.color};font-size:13px;padding:6px 13px;">${sz.name}</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <input type="number" class="price-input" value="${sz.price}" onchange="updatePrice('${sz.id}',this.value)" inputmode="numeric">
        <span style="font-size:13px;color:#aaa;">원/개</span>
      </div>
    </div>`;
  }).join('');
  buildWorkerSelect();
}
function addWorker(){const n=document.getElementById('new-worker').value.trim();if(!n)return;if(state.workers.includes(n)){alert('이미 등록된 작업자입니다.');return;}state.workers.push(n);save();document.getElementById('new-worker').value='';renderSettings();}
function removeWorker(i){if(!confirm(`"${state.workers[i]}"을(를) 삭제하시겠습니까?`))return;state.workers.splice(i,1);save();renderSettings();}
function updatePrice(id,v){const sz=state.sizes.find(s=>s.id===id);if(sz){sz.price=parseInt(v)||0;save();}}
function clearData(){if(!confirm('모든 데이터를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다.'))return;localStorage.removeItem('meterapp');location.reload();}

renderHome();renderSettings();
</script>
</body>
</html>
